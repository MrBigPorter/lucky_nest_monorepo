# =========================
# CORS 白名单（开发场景）
# =========================
map $http_origin $cors_origin {
    default "";
    ~^http://(localhost|127\.0\.0\.1|0\.0\.0\.0):4000$ $http_origin;
    "https://admin.joyminis.com" $http_origin;
    "https://dev.joyminis.com" $http_origin;
    "https://dev-api.joyminis.com" $http_origin; 
}

map $request_method $cors_preflight {
    default 0;
    OPTIONS 1;
}

# ==========================================
# 1) Flutter H5 的 API 网关（dev.joyminis.com）
# ==========================================
server {
    listen 80;
    server_name dev.joyminis.com;

    # 普通 API
    location ^~ /api/ {
        if ($cors_preflight) {
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Credentials true always;
            add_header Access-Control-Allow-Methods "GET,POST,PUT,PATCH,DELETE,OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type,Authorization,X-Requested-With,Cache-Control,lang,currenttime,device,signature_nonce" always;
            add_header Content-Length 0;
            return 204;
        }
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Credentials true always;
        add_header Vary Origin always;

        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
     }

    # CDN 图片转发
    location ^~ /cdn-cgi/ {
        proxy_hide_header Access-Control-Allow-Origin; # 避免重复
        if ($cors_origin != "") {
            add_header Access-Control-Allow-Origin $cors_origin always;
        }
        if ($request_method = OPTIONS) { return 204; }

        proxy_pass https://img.joyminis.com;
        proxy_set_header Host img.joyminis.com;
        proxy_ssl_server_name on;
    }

    # Flutter 页面不走这里，走本地 localhost:4000
    location / { return 404; }
}

# ==========================================
# 2) HTTPS 跳转
# ==========================================
server {
    listen 80;
    # 注意：把 dev-api 也加进来，防止 http 访问时没反应
    server_name admin.joyminis.com dev-api.joyminis.com;
    return 301 https://$host$request_uri;
}

# ==========================================
# 3) 核心服务（Admin + Webhook + Swagger）
# ==========================================
server {
    listen 443 ssl;
    # 这里必须加上 dev-api 域名，否则 Tunnel 进来的请求 Nginx 不认识
    server_name admin.joyminis.com dev-api.joyminis.com;

    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;

    # --------------------------------------------------------
    # 专门拦截 /api/v1/payment 再转发给后端
    # --------------------------------------------------------
    location /api/v1/payment/webhook/xendit {
        proxy_pass http://backend:3000;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 兜底：如果 Xendit 改了配置不发 /v1，这个也能接住
    location /api/payment/webhook/xendit {
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # --------------------------------------------------------
    # 文档 Swagger 配置
    # --------------------------------------------------------
    location ^~ /docs {
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
    }
    location ^~ /swagger-ui/ {
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
    }
    # 某些 NestJS 版本还需要这个 json
    location ^~ /api-json {
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
    }

    # --------------------------------------------------------
    # 普通 API
    # --------------------------------------------------------
    location ^~ /api/ {
        # CORS 配置...
        if ($cors_preflight) {
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Credentials true always;
            add_header Access-Control-Allow-Methods "GET,POST,PUT,DELETE,PATCH,OPTIONS" always;
            add_header Access-Control-Allow-Headers "*" always; # 偷懒写法，开发环境可用
            add_header Content-Length 0;
            return 204;
        }
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Credentials true always;

        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # WebSocket 支持
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # --------------------------------------------------------
    # 特殊接口白名单（调账）
    # --------------------------------------------------------
    location = /api/v1/admin/finance/adjust {
        include /etc/nginx/conf.d/whitelist.conf;
        deny all;

        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
    }

    # CDN 图片
    location ^~ /cdn-cgi/ {
        proxy_pass https://img.joyminis.com;
        proxy_set_header Host img.joyminis.com;
        proxy_ssl_server_name on;
    }

    # --------------------------------------------------------
    # 后台前端页面 (最后匹配)
    # --------------------------------------------------------
    location / {
        proxy_pass http://mini-shop-admin:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}