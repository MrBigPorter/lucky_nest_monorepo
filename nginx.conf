server {
    listen 443 ssl;
    server_name localhost dev.joyminis.com;

    # SSL 配置
    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;

    # ====================================================
    # 1. 核心安全设置：拦截人工调账接口
    #    (既要 IP 拦截，又要处理跨域)
    # ====================================================
    location /api/v1/admin/finance/adjust {
       # ---OPTIONS 预检请求 (免死金牌) ---
       # 必须放在 allow/deny 之前！否则浏览器问路会被拦截
       if ($request_method = 'OPTIONS') {
           add_header 'Access-Control-Allow-Origin' '$http_origin' always;
           add_header 'Access-Control-Allow-Credentials' 'true' always;
           add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
           add_header 'Access-Control-Allow-Headers' 'DNT,X-Mx-ReqToken,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization' always;
           add_header 'Content-Length' 0;
           add_header 'Content-Type' 'text/plain; charset=utf-8';
           return 204;
       }

       # --- 正常请求的 CORS 头 ---
       add_header 'Access-Control-Allow-Origin' '$http_origin' always;
       add_header 'Access-Control-Allow-Credentials' 'true' always;
       add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
       add_header 'Access-Control-Allow-Headers' 'DNT,X-Mx-ReqToken,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization' always;

       # ---  IP 拦截 (保安) ---
       include /etc/nginx/conf.d/whitelist.conf;
       deny all;

       # ---  转发 ---
       proxy_pass http://backend:3000;
       proxy_set_header Host $host;
       proxy_set_header X-Real-IP $remote_addr;
       proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ====================================================
    #  普通后端 API 转发
    #    (虽然不拦截 IP，但也必须加 CORS 头，否则也会跨域)
    # ====================================================
    location /api/ {
        # --- CORS 配置 ---
        if ($request_method = 'OPTIONS') {
           add_header 'Access-Control-Allow-Origin' '$http_origin' always;
           add_header 'Access-Control-Allow-Credentials' 'true' always;
           add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
           add_header 'Access-Control-Allow-Headers' 'DNT,X-Mx-ReqToken,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization' always;
           add_header 'Content-Length' 0;
           add_header 'Content-Type' 'text/plain; charset=utf-8';
           return 204;
        }

        add_header 'Access-Control-Allow-Origin' '$http_origin' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,X-Mx-ReqToken,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization' always;

        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # WebSocket
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    #  允许访问文档页面
    location /docs {
        proxy_pass http://backend:3000/docs;
        proxy_set_header Host $host;
    }

    #  关键：Swagger 通常需要加载一些静态资源 (json/css/js)
    # 如果你的 Swagger 路径是 /docs，它会请求 /docs-json 或类似路径
    location /docs-json {
        proxy_pass http://backend:3000/docs-json;
    }

    # ====================================================
    #  前端页面
    # ====================================================
    location / {
        proxy_pass http://mini-shop-admin:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

        # ==========================================
        # 6. 图片/CDN 转发 (替代 Vite proxy)
        # ==========================================
        location /cdn-cgi/ {
            # 转发给真实的线上图片服务器
            proxy_pass https://img.joyminis.com;

            # 欺骗对方服务器：我是从 img.joyminis.com 来的
            # (对应 Vite 里的 changeOrigin: true)
            proxy_set_header Host img.joyminis.com;

            # 必须把 SSL 握手时的域名也改掉，否则 Cloudflare 会拒绝连接
            proxy_ssl_server_name on;

            # 支持 HTTPS 转发
            proxy_ssl_protocols TLSv1.2 TLSv1.3;

            # 隐藏掉自己的 IP，像个普通用户一样访问
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   html;
    }
}