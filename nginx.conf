# 1. 全局映射配置 (放在 server 块之外)
map $http_origin $cors_origin {
    default "";
    ~^http://(localhost|127\.0\.0\.1|0\.0\.0\.0):4000$ $http_origin;
    "https://admin.joyminis.com" $http_origin;
    "https://dev.joyminis.com" $http_origin;
    "https://dev-api.joyminis.com" $http_origin;
}

map $request_method $cors_preflight {
    default 0;
    OPTIONS 1;
}

# ==========================================
# 2) HTTP Server (监听 80 端口)
# 作用：专门接收 Tunnel 转发过来的 dev.joyminis.com 图片请求
# 理由：绕过本地自签名证书不匹配 dev 域名的 SSL 握手报错
# ==========================================
server {
    listen 80;
    server_name dev.joyminis.com;

    # 包含图片和视频的统一转发逻辑
        location ~* ^/(cdn-cgi/|uploads/).*\.(jpg|jpeg|png|webp|gif|avif|mp4|mov|m4a)$ {
            # 1. 跨域与暴露头
            proxy_hide_header Access-Control-Allow-Origin;
            add_header Access-Control-Allow-Origin '*' always;
            add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS' always;
            add_header Access-Control-Allow-Headers 'Range, DNT, User-Agent, X-Requested-With, If-Modified-Since, Cache-Control, Content-Type' always;
            add_header Access-Control-Expose-Headers 'Content-Length, Content-Range, Accept-Ranges' always;

            # 2. 视频与大图优化
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_http_version 1.1;

            # 3. 转发 Range 关键头 (视频起飞的核心)
            proxy_set_header Range $http_range;
            proxy_set_header If-Range $http_if_range;

            proxy_pass_header Content-Range;
            proxy_pass_header Accept-Ranges;
            proxy_pass_header Content-Length;

            # 4. 转发到 R2
            proxy_pass https://img.joyminis.com;
            proxy_set_header Host img.joyminis.com;
            proxy_ssl_server_name on;
            proxy_ssl_verify off;

            # 处理 OPTIONS
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin '*' always;
                add_header Content-Length 0;
                return 204;
            }
        }

    # 其他 80 端口请求直接 404
    location / { return 404; }
}

# ==========================================
# 3) HTTPS Server (监听 443 端口)
# 作用：处理核心业务 API、WebSocket 和 管理后台
# ==========================================
server {
    listen 443 ssl;
    server_name admin.joyminis.com dev-api.joyminis.com dev.joyminis.com;

    # 使用你现有的 admin 证书（因为它匹配这两个域名）
    ssl_certificate     /etc/nginx/certs/admin.joyminis.com+3.pem;
    ssl_certificate_key /etc/nginx/certs/admin.joyminis.com+3-key.pem;

    # 允许 SSL 忽略域名不匹配（应对 mkcert 证书问题）
    proxy_ssl_server_name on;

    location ~* ^/(cdn-cgi/|uploads/).*\.(jpg|jpeg|png|webp|gif|avif|mp4|mov|m4a)$ {
        # 1. 跨域与暴露头
        proxy_hide_header Access-Control-Allow-Origin;
        add_header Access-Control-Allow-Origin '*' always;
        add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS' always;
        add_header Access-Control-Allow-Headers 'Range, DNT, User-Agent, X-Requested-With, If-Modified-Since, Cache-Control, Content-Type' always;
        add_header Access-Control-Expose-Headers 'Content-Length, Content-Range, Accept-Ranges' always;

        # 2. 视频流优化：禁用缓冲 + 强制 1.1
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_http_version 1.1;

        # 3. 转发 Range 请求给 R2
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;

        # 4. 透传 R2 响应头
        proxy_pass_header Content-Range;
        proxy_pass_header Accept-Ranges;
        proxy_pass_header Content-Length;

        # 5. 伪装 UA 让 Cloudflare 压缩图片
        proxy_set_header Accept "image/webp,image/avif,*/*";
        proxy_set_header User-Agent "Mozilla/5.0 (iPhone; CPU iPhone OS 16_6 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/16.6 Mobile/15E148 Safari/604.1";

        proxy_pass https://img.joyminis.com;
        proxy_set_header Host img.joyminis.com;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;

        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin '*' always;
            add_header Content-Length 0;
            return 204;
        }
    }

    # WebSocket (Socket.IO) 专用通道
    location ^~ /socket.io/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
    }

    # 普通 API 接口
    location ^~ /api/ {
        if ($cors_preflight) {
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Credentials true always;
            add_header Access-Control-Allow-Methods "GET,POST,PUT,DELETE,PATCH,OPTIONS" always;
            add_header Access-Control-Allow-Headers "*" always;
            add_header Content-Length 0;
            return 204;
        }
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Credentials true always;

        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 静态文件或后台前端
    location / {
        proxy_pass http://mini-shop-admin:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}