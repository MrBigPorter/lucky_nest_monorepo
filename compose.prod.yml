# ==========================================
# 生产环境 Docker Compose (1GB VPS)
# ==========================================
# 本地构建 + 部署: ./deploy/deploy.sh
# 仅重启:         ./deploy/deploy.sh --quick
# 停止: docker compose -f compose.prod.yml down
# 日志: docker compose -f compose.prod.yml logs -f
# ==========================================
# 内存预算 (1GB 服务器):
#   OS + Docker: ~130 MB
#   Backend:     ≤300 MB
#   PostgreSQL:  ≤200 MB
#   Redis:       ≤150 MB (maxmemory 128MB)
#   Nginx:       ≤30 MB
#   Swap 兜底:   1 GB
#   总计:        ~810 MB + 1 GB swap
# ==========================================

services:
  # =========================================
  # 后端 API (生产模式)
  # =========================================
  # 镜像来源:
  #   - CI 部署: GHCR 拉取 (ghcr.io/mrbigporter/lucky-backend-prod:latest)
  #   - 本地部署: deploy.sh 本地构建 (lucky-backend-prod:latest)
  # 通过 BACKEND_IMAGE 环境变量切换, 默认本地镜像
  # =========================================
  backend:
    image: ${BACKEND_IMAGE:-lucky-backend-prod:latest}
    container_name: lucky-backend-prod
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    env_file:
      - deploy/.env.prod
    environment:
      # 限制 Node.js 堆内存 (防 OOM)
      - NODE_OPTIONS=--max-old-space-size=256
    deploy:
      resources:
        limits:
          memory: 300M
        reservations:
          memory: 150M
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/v1/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [app]

  # =========================================
  # Admin 前端构建器 (仅本地/自托管部署时使用)
  # =========================================
  # CI 部署: admin-next 由 Cloudflare Pages 托管，不需要此服务
  # 本地/自托管部署: deploy.sh 使用 --profile local 启动
  # =========================================
  admin-builder:
    profiles: [local]
    build:
      context: .
      dockerfile: apps/admin-next/Dockerfile.prod
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-https://api.joyminis.com}
        NEXT_PUBLIC_APP_ENV: production
    image: lucky-admin-next-builder:latest
    container_name: lucky-admin-next-builder
    volumes:
      - admin_dist:/app/apps/admin-next/out
    networks: [app]

  # =========================================
  # Nginx 反向代理 + API 网关
  # =========================================
  nginx:
    image: nginx:latest
    container_name: lucky-nginx-prod
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 30M
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/whitelist.conf:/etc/nginx/conf.d/whitelist.conf
      - ./certs:/etc/nginx/certs
      - ./nginx/html:/var/www/html
      - admin_dist:/var/www/admin
    depends_on:
      backend:
        condition: service_healthy
    networks: [app]

  # =========================================
  # Redis
  # =========================================
  redis:
    image: redis:7-alpine
    container_name: lucky-redis-prod
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    command: redis-server /etc/redis/redis.conf --requirepass "${REDIS_PASSWORD:-changeme}"
    deploy:
      resources:
        limits:
          memory: 150M
        reservations:
          memory: 64M
    env_file:
      - deploy/.env.prod
    volumes:
      - redis_data:/data
      - ./redis/redis.conf:/etc/redis/redis.conf
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD:-changeme} ping | grep PONG"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [app]

  # =========================================
  # PostgreSQL
  # =========================================
  db:
    image: postgres:16-alpine
    container_name: lucky-db-prod
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 200M
        reservations:
          memory: 64M
    # 优化 PG 内存使用 (1GB 服务器)
    command: >
      postgres
        -c shared_buffers=32MB
        -c work_mem=4MB
        -c maintenance_work_mem=32MB
        -c effective_cache_size=128MB
        -c max_connections=30
    env_file:
      - deploy/.env.prod
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [app]

networks:
  app:

volumes:
  db_data:
  redis_data:
  admin_dist:

