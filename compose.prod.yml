# ==========================================
# 生产环境 Docker Compose
# ==========================================
# 启动: docker compose -f compose.prod.yml --env-file deploy/.env.prod up -d --build
# 停止: docker compose -f compose.prod.yml down
# 日志: docker compose -f compose.prod.yml logs -f
# ==========================================

services:
  # =========================================
  # 后端 API (生产模式 — 多阶段构建)
  # =========================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile.prod
    image: lucky-backend-prod:latest
    container_name: lucky-backend-prod
    restart: unless-stopped
    env_file:
      - deploy/.env.prod
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/v1/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [app]

  # =========================================
  # Admin 前端 (构建静态文件)
  # =========================================
  admin-builder:
    build:
      context: .
      dockerfile: apps/mini-shop-admin/Dockerfile.prod
    image: lucky-admin-builder:latest
    container_name: lucky-admin-builder
    volumes:
      - admin_dist:/app/apps/mini-shop-admin/dist
    networks: [app]

  # =========================================
  # Nginx 反向代理
  # =========================================
  nginx:
    image: nginx:latest
    container_name: lucky-nginx-prod
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/whitelist.conf:/etc/nginx/conf.d/whitelist.conf
      - ./certs:/etc/nginx/certs
      - ./nginx/html:/var/www/html
      - admin_dist:/var/www/admin
    depends_on:
      admin-builder:
        condition: service_completed_successfully
      backend:
        condition: service_healthy
    networks: [app]

  # =========================================
  # Redis
  # =========================================
  redis:
    image: redis:7
    container_name: lucky-redis-prod
    restart: unless-stopped
    command: redis-server /etc/redis/redis.conf --requirepass "${REDIS_PASSWORD}"
    env_file:
      - deploy/.env.prod
    volumes:
      - redis_data:/data
      - ./redis/redis.conf:/etc/redis/redis.conf
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping | grep PONG"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [app]

  # =========================================
  # PostgreSQL
  # =========================================
  db:
    image: postgres:16
    container_name: lucky-db-prod
    restart: unless-stopped
    env_file:
      - deploy/.env.prod
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [app]

networks:
  app:

volumes:
  db_data:
  redis_data:
  admin_dist:

