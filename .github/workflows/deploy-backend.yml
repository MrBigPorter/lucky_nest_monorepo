# ============================================================
# 后端部署 — 推送 main/test 分支时自动触发 (包含 Telegram 通知)
# ============================================================
name: Deploy Backend

on:
  push:
    branches: [main, test]
    paths:
      - "apps/api/**"
      - "packages/shared/**"
      - "packages/config/**"
      - "Dockerfile.prod"
      - "compose.prod.yml"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:
    inputs:
      runner:
        description: "🖥️ Runner (ubuntu-latest = GitHub托管 / self-hosted = 本地Mac算力)"
        type: choice
        options: [ubuntu-latest, self-hosted]
        default: ubuntu-latest
  workflow_call:
    inputs:
      runner:
        description: "Runner to use"
        type: string
        default: ubuntu-latest

concurrency:
  group: deploy-backend
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/mrbigporter/lucky-backend-prod

jobs:
  # =========================================
  # 阶段一: 构建 + 推送镜像到 GHCR (兵工厂打包)
  # =========================================
  build:
    runs-on: ${{ inputs.runner || 'ubuntu-latest' }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta (生成标签)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          # ---- Docker layer GHA 缓存 — 暂时禁用，GHA 存储空间不足，后续迁移 Docker Hub ----
          # cache-from: type=gha
          # cache-to: type=gha,mode=max

  # =========================================
  # 阶段二: SSH 部署到 VPS (前线换弹)
  # =========================================
  deploy:
    needs: build
    runs-on: ${{ inputs.runner || 'ubuntu-latest' }}
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync deploy scripts to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "deploy/*.sh"
          target: /opt/lucky/deploy
          overwrite: true

      - name: Deploy via SSH (登录服务器执行脚本)
        uses: appleboy/ssh-action@v1.2.0
        env:
          GHCR_TOKEN: ${{ secrets.VPS_GHCR_PAT }}
          GHCR_USER: ${{ github.repository_owner }}
          IMAGE: ${{ env.IMAGE_NAME }}:latest
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GHCR_TOKEN,GHCR_USER,IMAGE
          script: |
            set -e
            cd /opt/lucky

            # 0. 确保同步后的脚本可执行
            chmod +x deploy/*.sh || true

            # 1. 登录 GHCR
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            # 2. 拉取新镜像
            echo "→ 拉取镜像: $IMAGE"
            docker pull "$IMAGE"

            # 3. 运行数据库迁移 (临时容器 — 失败时不影响正在运行的后端!)
            echo "→ 运行数据库迁移..."
            NETWORK=$(docker inspect lucky-db-prod \
              --format '{{range $k,$v := .NetworkSettings.Networks}}{{$k}}{{end}}' \
              | awk '{print $1}')
            docker run --rm \
              --network "$NETWORK" \
              --env-file deploy/.env.prod \
              --entrypoint "" \
              "$IMAGE" \
              ./apps/api/node_modules/.bin/prisma migrate deploy \
                --schema=apps/api/prisma/schema.prisma
            echo "✅ 迁移完成"

            # 4. 保存当前镜像 SHA (用于健康检查失败时自动回滚)
            PREV_IMAGE=$(docker inspect lucky-backend-prod \
              --format '{{.Config.Image}}' 2>/dev/null || echo "")

            # 5. 用新镜像重启后端
            echo "→ 重启后端容器..."
            BACKEND_IMAGE="$IMAGE" docker compose -f compose.prod.yml \
              --env-file deploy/.env.prod \
              up -d --no-build --force-recreate backend

            # 6. 健康检查 (最多等 90 秒)
            echo "→ 等待健康检查..."
            HEALTHY=false
            for i in $(seq 1 30); do
              if docker exec lucky-backend-prod wget -qO- http://localhost:3000/api/v1/health >/dev/null 2>&1; then
                echo "✅ 健康检查通过 (第 ${i} 次, 约 $((i*3))s)"
                HEALTHY=true
                break
              fi
              sleep 3
            done

            # 7. 健康检查失败 → 自动回滚到旧镜像
            if [ "$HEALTHY" = false ]; then
              echo "❌ 健康检查超时! 正在回滚..."
              docker logs --tail=50 lucky-backend-prod
              if [ -n "$PREV_IMAGE" ]; then
                echo "→ 回滚到旧镜像: $PREV_IMAGE"
                BACKEND_IMAGE="$PREV_IMAGE" docker compose -f compose.prod.yml \
                  --env-file deploy/.env.prod \
                  up -d --no-build --force-recreate backend
                echo "⚠️  已回滚到旧版本！请检查新镜像日志排查原因。"
              fi
              exit 1
            fi

            # 8. 状态报告
            docker compose -f compose.prod.yml ps

            # 9. 清理旧镜像
            docker image prune -f

      # =========================================
      # 阶段三: Telegram 战报通知
      # =========================================
      - name: 📱 Send Telegram Notification
        if: always() # 无论成功失败，这步绝对不能丢！
        run: |
          STATUS_EMOJI="✅ 成功 (Success)"
          if [ "${{ job.status }}" != "success" ]; then
            STATUS_EMOJI="❌ 失败 (Failed)"
          fi

          # 专门为后端定制的消息模板
          MESSAGE="⚙️ *Lucky Backend 部署报告*
          📌 *状态*: $STATUS_EMOJI
          🏷️ *环境*: Production (VPS: ***REDACTED***) — branch: \`${{ github.ref_name }}\`
          🔗 *API*: [api.joyminis.com](https://api.joyminis.com/api/v1/health)
          📝 *Commit ID*: \`${{ github.sha }}\`"

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=$MESSAGE" \
            -d "parse_mode=Markdown"
