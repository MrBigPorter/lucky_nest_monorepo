name: Deploy Admin (Cloudflare)

on:
  push:
    branches: [main, test]
    paths:
      - "apps/admin-next/**"
      - "packages/shared/**"
      - "packages/ui/**"
      - ".github/workflows/deploy-admin-cloudflare.yml"
  workflow_dispatch:
    inputs:
      runner:
        description: "🖥️ Runner (ubuntu-latest = GitHub托管 / self-hosted = 本地Mac算力)"
        type: choice
        options: [ubuntu-latest, self-hosted]
        default: ubuntu-latest
  workflow_call:
    inputs:
      runner:
        description: "Runner to use"
        type: string
        default: ubuntu-latest

concurrency:
  group: deploy-admin-cloudflare-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  deployments: write

jobs:
  quality:
    runs-on: ${{ inputs.runner || 'ubuntu-latest' }}

    steps:
      # Step 1 / 步骤 1: Checkout repository source code
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      # Step 2 / 步骤 2: Setup Node.js runtime
      - name: 2. Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Step 3 / 步骤 3: Enable Corepack (Yarn 4 toolchain)
      - name: 3. Enable Corepack
        run: corepack enable

      # Step 4 / 步骤 4: Install monorepo dependencies
      - name: 4. Install Dependencies
        run: yarn install --immutable

      # Step 5 / 步骤 5: Build shared workspace packages
      - name: 5. Build shared packages
        run: |
          node packages/shared/scripts/build.js
          node packages/ui/scripts/build.js

      # Step 6 / 步骤 6: Run admin lint, typecheck, and unit tests
      - name: 6. Lint + Typecheck + Unit tests (admin-next)
        run: |
          yarn workspace @lucky/admin-next lint
          yarn workspace @lucky/admin-next check-types
          yarn workspace @lucky/admin-next test

  deploy:
    needs: quality
    runs-on: ${{ inputs.runner || 'ubuntu-latest' }}
    environment: ${{ github.ref_name == 'main' && 'production' || 'preview' }}

    steps:
      # Step 1 / 步骤 1: Checkout repository source code
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      # Step 2 / 步骤 2: Setup Node.js runtime
      - name: 2. Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Step 3 / 步骤 3: Enable Corepack (Yarn 4 toolchain)
      - name: 3. Enable Corepack
        run: corepack enable

      # Step 4 / 步骤 4: Install monorepo dependencies
      - name: 4. Install Dependencies
        run: yarn install --immutable

      # Step 5 / 步骤 5: Build shared workspace packages
      - name: 5. Build shared packages
        run: |
          node packages/shared/scripts/build.js
          node packages/ui/scripts/build.js

      # Step 5.1 / 步骤 5.1: Prepare build timestamp and commit SHA metadata
      - name: 5.1 Prepare Build Metadata
        id: build_meta
        run: |
          echo "deployed_at=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"
          echo "git_sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      # Step 6 / 步骤 6: Build admin bundle for Cloudflare Workers
      - name: 6. Build Admin for Cloudflare Workers
        working-directory: apps/admin-next
        env:
          NEXT_PUBLIC_API_BASE_URL: ${{ secrets.NEXT_PUBLIC_API_BASE_URL }}
          NEXT_PUBLIC_WS_URL: ${{ secrets.NEXT_PUBLIC_WS_URL }}
          NEXT_PUBLIC_RECAPTCHA_SITE_KEY: ${{ secrets.NEXT_PUBLIC_RECAPTCHA_SITE_KEY }}
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
          NEXT_PUBLIC_APP_ENV: production
          NEXT_PUBLIC_DEPLOYED_AT: ${{ steps.build_meta.outputs.deployed_at }}
          NEXT_PUBLIC_GIT_SHA: ${{ steps.build_meta.outputs.git_sha }}
        run: |
          # -c is a wrangler flag (config file path), NOT an open-next flag.
          # opennextjs-cloudflare build auto-reads open-next.config.ts — no -c needed.
          yarn exec opennextjs-cloudflare build

      # Step 7 / 步骤 7: Validate Cloudflare credentials before deploy
      - name: 7. Validate Cloudflare Secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          NEXT_PUBLIC_RECAPTCHA_SITE_KEY: ${{ secrets.NEXT_PUBLIC_RECAPTCHA_SITE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN is not set in GitHub secrets for environment '${{ github.ref_name == 'main' && 'production' || 'preview' }}'."
            echo "::error::Go to Settings > Environments > ${{ github.ref_name == 'main' && 'production' || 'preview' }} > Secrets and add CLOUDFLARE_API_TOKEN."
            exit 1
          fi
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::error::CLOUDFLARE_ACCOUNT_ID is not set in GitHub secrets."
            exit 1
          fi
          if [ -z "$NEXT_PUBLIC_RECAPTCHA_SITE_KEY" ]; then
            echo "::error::NEXT_PUBLIC_RECAPTCHA_SITE_KEY is empty. register-apply will submit recaptchaToken='' and backend will reject."
            echo "::error::Set NEXT_PUBLIC_RECAPTCHA_SITE_KEY in Environment Secrets (${{ github.ref_name == 'main' && 'production' || 'preview' }})."
            exit 1
          fi
          # Verify token validity via Cloudflare API before attempting deploy
          HTTP_STATUS=$(curl -s -o /tmp/cf-verify.json -w "%{http_code}" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/user/tokens/verify")
          SUCCESS=$(python3 -c "import json; d=json.load(open('/tmp/cf-verify.json')); print(d.get('success', False))" 2>/dev/null || echo "false")
          if [ "$HTTP_STATUS" != "200" ] || [ "$SUCCESS" != "True" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN is invalid or expired (HTTP $HTTP_STATUS, success=$SUCCESS)."
            echo "::error::Create a new token at https://dash.cloudflare.com/profile/api-tokens with:"
            echo "::error::  Permissions:"
            echo "::error::    - Account > Workers Scripts > Edit"
            echo "::error::    - Account > Workers Assets > Edit (for static assets)"
            echo "::error::    - User > User Details > Read (to suppress email warning)"
            echo "::error::  Account Resources: Include > All accounts (or your specific account)"
            echo "::error::  Zone Resources: Include > All zones  <-- required by Cloudflare UI to save the form"
            echo "::error::Then update the secret in: Settings > Environments > ${{ github.ref_name == 'main' && 'production' || 'preview' }} > Secrets"
            cat /tmp/cf-verify.json
            exit 1
          fi
          echo "✅ Cloudflare API token is valid."

      # Step 8 / 步骤 8: Deploy built assets to Cloudflare Workers
      - name: 8. Deploy to Cloudflare Workers
        id: cloudflare_deploy
        working-directory: apps/admin-next
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail

          yarn exec opennextjs-cloudflare deploy -c wrangler.jsonc 2>&1 | tee /tmp/cloudflare-deploy.log

          CF_DEPLOYMENT_ID=$(grep -Eio 'deployment( id)?[: ]+[a-z0-9_-]+' /tmp/cloudflare-deploy.log \
            | tail -1 \
            | sed -E 's/.*[: ]+([a-z0-9_-]+)$/\1/I' || true)

          CF_VERSION_ID=$(grep -Eio 'version( id)?[: ]+[a-z0-9_-]+' /tmp/cloudflare-deploy.log \
            | tail -1 \
            | sed -E 's/.*[: ]+([a-z0-9_-]+)$/\1/I' || true)

          # Keep empty when parsing fails; downstream UI/Telegram falls back to n/a.
          if [ -z "$CF_DEPLOYMENT_ID" ]; then
            CF_DEPLOYMENT_ID=""
          fi
          if [ -z "$CF_VERSION_ID" ]; then
            CF_VERSION_ID=""
          fi

          echo "cloudflare_deployment_id=$CF_DEPLOYMENT_ID" >> "$GITHUB_OUTPUT"
          echo "cloudflare_version_id=$CF_VERSION_ID" >> "$GITHUB_OUTPUT"

      # Step 9 / 步骤 9: Create GitHub Deployment record for traceability
      - name: 9. Create GitHub Deployment Record
        id: github_deploy
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
          ENV_NAME: ${{ github.ref_name == 'main' && 'production' || 'preview' }}
        run: |
          set -euo pipefail

          BODY=$(cat <<JSON
          {
            "ref": "${{ github.sha }}",
            "environment": "${ENV_NAME}",
            "auto_merge": false,
            "required_contexts": [],
            "description": "Admin Cloudflare deploy"
          }
          JSON
          )

          RESP=$(curl -sS -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/deployments" \
            -d "$BODY")

          DEPLOYMENT_ID=$(echo "$RESP" | python3 -c 'import json,sys; d=json.load(sys.stdin); print(d.get("id", ""))')
          if [ -z "$DEPLOYMENT_ID" ]; then
            echo "Failed to create GitHub deployment"
            echo "$RESP"
            exit 1
          fi

          echo "deployment_id=$DEPLOYMENT_ID" >> "$GITHUB_OUTPUT"

      # Step 10 / 步骤 10: Mark GitHub Deployment as success with URL/logs
      - name: 10. Mark GitHub Deployment Success
        if: success() && steps.github_deploy.outputs.deployment_id != ''
        env:
          GH_TOKEN: ${{ github.token }}
          DEPLOYMENT_ID: ${{ steps.github_deploy.outputs.deployment_id }}
          ENV_URL: ${{ secrets.CF_ADMIN_HEALTHCHECK_URL }}
        run: |
          set -euo pipefail

          TARGET_URL=""
          if [ -n "$ENV_URL" ]; then
            TARGET_URL=",\"environment_url\":\"$ENV_URL\""
          fi

          curl -sS -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/deployments/$DEPLOYMENT_ID/statuses" \
            -d "{\"state\":\"success\",\"log_url\":\"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"${TARGET_URL}}" > /dev/null

      # Step 11 / 步骤 11: Optional smoke check against production URL
      - name: 11. Smoke Check (optional)
        if: github.ref_name == 'main'
        env:
          HEALTHCHECK_URL: ${{ secrets.CF_ADMIN_HEALTHCHECK_URL }}
        run: |
          if [ -z "$HEALTHCHECK_URL" ]; then
            echo "CF_ADMIN_HEALTHCHECK_URL is empty, skip smoke check"
            exit 0
          fi

          curl --fail --silent --show-error --location \
            --max-time 20 \
            "$HEALTHCHECK_URL" > /dev/null

      # Step 12 / 步骤 12: Publish deployment summary to GitHub UI
      - name: 12. Publish Deployment Summary
        if: always()
        run: |
          cat <<EOF >> "$GITHUB_STEP_SUMMARY"
          ## Cloudflare Admin Deployment

          - Environment: ${{ github.ref_name == 'main' && 'production' || 'preview' }}
          - Commit: \`${{ github.sha }}\`
          - Rollback Note: rollback to previous known good deployment before commit \`${{ github.sha }}\`

          ### Quick Rollback Note (DNS)
          - Dry-run: \`yarn rollback:admin:dns\`
          - Execute: \`yarn rollback:admin:dns:execute\`
          EOF

      # Step 13 / 步骤 13: Send deployment result to Telegram channel
      - name: 13. Send Telegram Notification
        if: always()
        run: |
          STATUS_EMOJI="✅ Success"
          if [ "${{ job.status }}" != "success" ]; then
            STATUS_EMOJI="❌ Failed"
          fi

          if [ "${{ github.ref_name }}" = "main" ]; then
            ADMIN_URL="https://admin.joyminis.com"
            ADMIN_DOMAIN_LABEL="admin.joyminis.com"
          else
            ADMIN_URL="https://admin-dev.joyminis.com"
            ADMIN_DOMAIN_LABEL="admin-dev.joyminis.com"
          fi

          MESSAGE="☁️ *Admin Next Cloudflare Deployment Report*
          📌 *Status*: $STATUS_EMOJI
          🏷️ *Environment*: ${{ github.ref_name == 'main' && 'Production' || 'Preview' }} (Cloudflare Workers)
          🔗 *Admin URL*: [$ADMIN_DOMAIN_LABEL]($ADMIN_URL)
          📝 *Commit*: \`${{ github.sha }}\`"

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=$MESSAGE" \
            -d "parse_mode=Markdown"
