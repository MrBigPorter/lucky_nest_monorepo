name: Deploy Admin (Cloudflare)

on:
  push:
    branches: [main, test]
    paths:
      - 'apps/admin-next/**'
      - 'packages/shared/**'
      - 'packages/ui/**'
      - '.github/workflows/deploy-admin-cloudflare.yml'
  workflow_dispatch:
  workflow_call:

concurrency:
  group: deploy-admin-cloudflare-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  deployments: write

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: 3. Enable Corepack
        run: corepack enable

      - name: 4. Install Dependencies
        run: yarn install --immutable

      - name: 5. Build shared packages
        run: |
          node packages/shared/scripts/build.js
          node packages/ui/scripts/build.js

      - name: 6. Lint + Typecheck + Unit tests (admin-next)
        run: |
          yarn workspace @lucky/admin-next lint
          yarn workspace @lucky/admin-next check-types
          yarn workspace @lucky/admin-next test

  deploy:
    needs: quality
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'preview' }}

    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: 3. Enable Corepack
        run: corepack enable

      - name: 4. Install Dependencies
        run: yarn install --immutable

      - name: 5. Build shared packages
        run: |
          node packages/shared/scripts/build.js
          node packages/ui/scripts/build.js

      - name: 6. Build Admin for Cloudflare Workers
        working-directory: apps/admin-next
        env:
          NEXT_PUBLIC_API_BASE_URL: ${{ secrets.NEXT_PUBLIC_API_BASE_URL }}
          NEXT_PUBLIC_WS_URL: ${{ secrets.NEXT_PUBLIC_WS_URL }}
          NEXT_PUBLIC_APP_ENV: production
          NEXT_BUILD_TARGET: cloudflare
        run: |
          yarn exec opennextjs-cloudflare build -c wrangler.jsonc

      - name: 7. Deploy to Cloudflare Workers
        id: cloudflare_deploy
        working-directory: apps/admin-next
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail

          yarn exec opennextjs-cloudflare deploy -c wrangler.jsonc 2>&1 | tee /tmp/cloudflare-deploy.log

          CF_DEPLOYMENT_ID=$(grep -Eio 'deployment( id)?[: ]+[a-z0-9_-]+' /tmp/cloudflare-deploy.log \
            | tail -1 \
            | sed -E 's/.*[: ]+([a-z0-9_-]+)$/\1/I' || true)

          CF_VERSION_ID=$(grep -Eio 'version( id)?[: ]+[a-z0-9_-]+' /tmp/cloudflare-deploy.log \
            | tail -1 \
            | sed -E 's/.*[: ]+([a-z0-9_-]+)$/\1/I' || true)

          if [ -z "$CF_DEPLOYMENT_ID" ]; then
            CF_DEPLOYMENT_ID="unknown"
          fi
          if [ -z "$CF_VERSION_ID" ]; then
            CF_VERSION_ID="unknown"
          fi

          echo "cloudflare_deployment_id=$CF_DEPLOYMENT_ID" >> "$GITHUB_OUTPUT"
          echo "cloudflare_version_id=$CF_VERSION_ID" >> "$GITHUB_OUTPUT"

      - name: 8. Create GitHub Deployment Record
        id: github_deploy
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
          ENV_NAME: ${{ github.ref_name == 'main' && 'production' || 'preview' }}
        run: |
          set -euo pipefail

          BODY=$(cat <<JSON
          {
            "ref": "${{ github.sha }}",
            "environment": "${ENV_NAME}",
            "auto_merge": false,
            "required_contexts": [],
            "description": "Admin Cloudflare deploy: ${{ steps.cloudflare_deploy.outputs.cloudflare_deployment_id }} / ${{ steps.cloudflare_deploy.outputs.cloudflare_version_id }}"
          }
          JSON
          )

          RESP=$(curl -sS -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/deployments" \
            -d "$BODY")

          DEPLOYMENT_ID=$(echo "$RESP" | python3 -c 'import json,sys; d=json.load(sys.stdin); print(d.get("id", ""))')
          if [ -z "$DEPLOYMENT_ID" ]; then
            echo "Failed to create GitHub deployment"
            echo "$RESP"
            exit 1
          fi

          echo "deployment_id=$DEPLOYMENT_ID" >> "$GITHUB_OUTPUT"

      - name: 9. Mark GitHub Deployment Success
        if: success() && steps.github_deploy.outputs.deployment_id != ''
        env:
          GH_TOKEN: ${{ github.token }}
          DEPLOYMENT_ID: ${{ steps.github_deploy.outputs.deployment_id }}
          ENV_URL: ${{ secrets.CF_ADMIN_HEALTHCHECK_URL }}
        run: |
          set -euo pipefail

          TARGET_URL=""
          if [ -n "$ENV_URL" ]; then
            TARGET_URL=",\"environment_url\":\"$ENV_URL\""
          fi

          curl -sS -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/deployments/$DEPLOYMENT_ID/statuses" \
            -d "{\"state\":\"success\",\"log_url\":\"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"${TARGET_URL}}" > /dev/null

      - name: 10. Smoke Check (optional)
        if: github.ref_name == 'main'
        env:
          HEALTHCHECK_URL: ${{ secrets.CF_ADMIN_HEALTHCHECK_URL }}
        run: |
          if [ -z "$HEALTHCHECK_URL" ]; then
            echo "CF_ADMIN_HEALTHCHECK_URL is empty, skip smoke check"
            exit 0
          fi

          curl --fail --silent --show-error --location \
            --max-time 20 \
            "$HEALTHCHECK_URL" > /dev/null

      - name: 11. Publish Deployment Summary
        if: always()
        run: |
          cat <<EOF >> "$GITHUB_STEP_SUMMARY"
          ## Cloudflare Admin Deployment

          - Environment: ${{ github.ref_name == 'main' && 'production' || 'preview' }}
          - Commit: \`${{ github.sha }}\`
          - Cloudflare Deployment ID: \`${{ steps.cloudflare_deploy.outputs.cloudflare_deployment_id || 'n/a' }}\`
          - Cloudflare Version ID: \`${{ steps.cloudflare_deploy.outputs.cloudflare_version_id || 'n/a' }}\`
          - Rollback Note: rollback to previous known good deployment before commit \`${{ github.sha }}\`

          ### Quick Rollback Note (DNS)
          - Dry-run: \`yarn rollback:admin:dns\`
          - Execute: \`yarn rollback:admin:dns:execute\`
          EOF

      - name: 12. Save Rollback Note Artifact
        if: always()
        run: |
          cat <<EOF > admin-cloudflare-release-note.txt
          run_id=${{ github.run_id }}
          env=${{ github.ref_name == 'main' && 'production' || 'preview' }}
          commit=${{ github.sha }}
          cloudflare_deployment_id=${{ steps.cloudflare_deploy.outputs.cloudflare_deployment_id || 'n/a' }}
          cloudflare_version_id=${{ steps.cloudflare_deploy.outputs.cloudflare_version_id || 'n/a' }}
          rollback_note=rollback to previous known good deployment before commit ${{ github.sha }}
          EOF

      - name: 13. Upload Rollback Note Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: admin-cloudflare-release-note-${{ github.run_id }}
          path: admin-cloudflare-release-note.txt

      - name: 14. Send Telegram Notification
        if: always()
        run: |
          STATUS_EMOJI="✅ 成功 (Success)"
          if [ "${{ job.status }}" != "success" ]; then
            STATUS_EMOJI="❌ 失败 (Failed)"
          fi

          MESSAGE="☁️ *Admin Next Cloudflare 部署报告*
          📌 *状态*: $STATUS_EMOJI
          🏷️ *环境*: ${{ github.ref_name == 'main' && 'Production' || 'Preview' }} (Cloudflare Workers)
          🆔 *Deployment*: \`${{ steps.cloudflare_deploy.outputs.cloudflare_deployment_id || 'n/a' }}\`
          🧩 *Version*: \`${{ steps.cloudflare_deploy.outputs.cloudflare_version_id || 'n/a' }}\`
          📝 *Commit ID*: \`${{ github.sha }}\`"

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=$MESSAGE" \
            -d "parse_mode=Markdown"

