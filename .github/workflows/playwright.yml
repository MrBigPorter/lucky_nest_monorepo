# ============================================================
# Playwright E2E — 独立工作流
# ============================================================
# 触发: push main
# 环境: GitHub Ubuntu runner（不占用生产服务器资源）
# 产物: 测试失败时上传截图 + trace + HTML report
#
# 与 ci.yml 的分工：
#   ci.yml       → Lint + 类型检查 + 单元测试 + 基础 E2E smoke
#   本文件        → 完整 Playwright E2E（更重，独立运行）
#
# Secrets 配置（在 GitHub 仓库 Settings → Secrets 添加）：
#   E2E_ADMIN_USERNAME   登录用的管理员账号（默认 admin）
#   E2E_ADMIN_PASSWORD   登录密码（必须配置，否则跳过）
# ============================================================

name: Playwright E2E

on:
  push:
    branches: [main]

# 同一 ref 新推送时取消旧运行
concurrency:
  group: playwright-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest

    steps:
      # Step 1 / 步骤 1: Check required E2E secret and decide whether to run
      - name: Check E2E secret availability
        id: e2e_gate
        env:
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
        run: |
          if [ -n "$E2E_ADMIN_PASSWORD" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "E2E_ADMIN_PASSWORD is not set, skip Playwright workflow"
          fi

      # Step 2 / 步骤 2: Checkout repository source code
      - name: Checkout
        if: steps.e2e_gate.outputs.enabled == 'true'
        uses: actions/checkout@v4

      # Step 3 / 步骤 3: Setup Node.js runtime
      - name: Setup Node.js 20
        if: steps.e2e_gate.outputs.enabled == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Step 4 / 步骤 4: Install native build tools for modules like sharp/bcrypt
      - name: Install native build tools (bcrypt / sharp)
        if: steps.e2e_gate.outputs.enabled == 'true'
        run: sudo apt-get install -y python3 make g++ openssl

      # Step 5 / 步骤 5: Enable Corepack and Yarn 4
      - name: Enable Corepack (Yarn 4)
        if: steps.e2e_gate.outputs.enabled == 'true'
        run: corepack enable && corepack prepare yarn@4.9.2 --activate

      # Step 6 / 步骤 6: Install workspace dependencies
      - name: Install dependencies
        if: steps.e2e_gate.outputs.enabled == 'true'
        run: yarn install --immutable

      # Step 7 / 步骤 7: Build shared package dependency (@lucky/shared)
      - name: Build @lucky/shared
        if: steps.e2e_gate.outputs.enabled == 'true'
        run: node packages/shared/scripts/build.js

      # Step 8 / 步骤 8: Build shared UI package dependency (@repo/ui)
      - name: Build @repo/ui
        if: steps.e2e_gate.outputs.enabled == 'true'
        run: node packages/ui/scripts/build.js

      # Step 9 / 步骤 9: Install Playwright Chromium browser and OS deps
      - name: Install Playwright Chromium + deps
        if: steps.e2e_gate.outputs.enabled == 'true'
        run: yarn workspace @lucky/admin-next playwright install chromium --with-deps

      # Step 10 / 步骤 10: Build admin-next app for E2E run
      - name: Build admin-next (standalone)
        if: steps.e2e_gate.outputs.enabled == 'true'
        run: yarn workspace @lucky/admin-next build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_API_BASE_URL: http://localhost:3001/api
          NEXT_PUBLIC_APP_ENV: production

      # Step 11 / 步骤 11: Start local mock API server (no real backend required)
      - name: Start mock API server (port 3001)
        if: steps.e2e_gate.outputs.enabled == 'true'
        run: |
          cat > /tmp/mock-api.js << 'MOCKEOF'
          const http = require('http');
          const server = http.createServer((req, res) => {
            res.setHeader('Content-Type', 'application/json');
            res.setHeader('Access-Control-Allow-Origin', '*');
            res.setHeader('Access-Control-Allow-Headers', 'Authorization, Content-Type');
            res.setHeader('Access-Control-Allow-Methods', 'GET, POST, PUT, PATCH, DELETE, OPTIONS');
            if (req.method === 'OPTIONS') { res.writeHead(204); res.end(); return; }

            let body = '';
            req.on('data', chunk => body += chunk);
            req.on('end', () => {
              if (req.url.includes('/auth/login')) {
                res.end(JSON.stringify({
                  code: 10000,
                  data: { accessToken: 'e2e-mock-token' }
                }));
              } else if (req.url.includes('/auth/logout')) {
                res.end(JSON.stringify({ code: 10000, data: null }));
              } else if (req.url.includes('/auth/profile')) {
                // 返回 401 让 middleware 正常走登录流程
                res.writeHead(401);
                res.end(JSON.stringify({ code: 40100, message: 'Unauthorized' }));
              } else {
                res.end(JSON.stringify({
                  code: 10000,
                  data: { list: [], total: 0, page: 1, pageSize: 20 }
                }));
              }
            });
          });
          server.listen(3001, '127.0.0.1', () => {
            console.log('[mock-api] listening on http://127.0.0.1:3001');
          });
          MOCKEOF
          node /tmp/mock-api.js &

      # Step 12 / 步骤 12: Start Next.js server and wait until ready
      - name: Start Next.js server (port 4001)
        if: steps.e2e_gate.outputs.enabled == 'true'
        run: |
          PORT=4001 node apps/admin-next/.next/standalone/apps/admin-next/server.js &
          npx --yes wait-on http://localhost:4001 --timeout 60000
        env:
          PORT: 4001
          HOSTNAME: 0.0.0.0

      # Step 13 / 步骤 13: Run Playwright E2E test suite
      - name: Run Playwright E2E
        id: e2e
        if: steps.e2e_gate.outputs.enabled == 'true'
        run: yarn workspace @lucky/admin-next e2e
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:4001
          E2E_ADMIN_USERNAME: ${{ secrets.E2E_ADMIN_USERNAME || 'admin' }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
          CI: true

      # Step 14 / 步骤 14: Upload failure screenshots for debugging
      - name: Upload screenshots (on failure)
        uses: actions/upload-artifact@v4
        if: failure() && steps.e2e_gate.outputs.enabled == 'true'
        with:
          name: playwright-screenshots-${{ github.run_id }}
          path: apps/admin-next/test-results/**/*.png
          retention-days: 7
          if-no-files-found: ignore

      # Step 15 / 步骤 15: Upload failure traces for deep diagnosis
      - name: Upload traces (on failure)
        uses: actions/upload-artifact@v4
        if: failure() && steps.e2e_gate.outputs.enabled == 'true'
        with:
          name: playwright-traces-${{ github.run_id }}
          path: apps/admin-next/test-results/**/*.zip
          retention-days: 7
          if-no-files-found: ignore

      # Step 16 / 步骤 16: Upload HTML report for all runs (success/failure)
      - name: Upload HTML report (always)
        uses: actions/upload-artifact@v4
        if: always() && steps.e2e_gate.outputs.enabled == 'true'
        with:
          name: playwright-html-report-${{ github.run_id }}
          path: apps/admin-next/playwright-report/
          retention-days: 14
          if-no-files-found: ignore

      # Step 17 / 步骤 17: Write E2E summary to GitHub Step Summary
      - name: Write E2E summary
        if: always()
        run: |
          if [ "${{ steps.e2e_gate.outputs.enabled }}" != "true" ]; then
            echo "## ⏭️ Playwright E2E — skipped" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "> missing secret: \`E2E_ADMIN_PASSWORD\`" >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          STATUS="${{ steps.e2e.outcome }}"
          if [ "$STATUS" = "success" ]; then
            ICON="✅"
          else
            ICON="❌"
          fi
          echo "## $ICON Playwright E2E — $STATUS" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 项目 | 值 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|----|" >> $GITHUB_STEP_SUMMARY
          echo "| 浏览器 | Chromium |" >> $GITHUB_STEP_SUMMARY
          echo "| 触发 | \`${{ github.event_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Ref | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 产物 | playwright-html-report-${{ github.run_id }} |" >> $GITHUB_STEP_SUMMARY
          if [ "$STATUS" != "success" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "> 📎 失败截图和 trace 见 Artifacts: \`playwright-screenshots-${{ github.run_id }}\`" >> $GITHUB_STEP_SUMMARY
          fi
