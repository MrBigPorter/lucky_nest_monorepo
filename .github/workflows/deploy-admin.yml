# ============================================================
# Admin 前端部署 — 构建 Docker 镜像推送 GHCR，SSH 部署到 VPS
# ============================================================
# 旧: 静态导出 → Cloudflare Pages
# 新: standalone Node.js → Docker → VPS (admin-next 容器)
# ============================================================
name: Deploy Admin

on:
  # VPS 仅保留手动兜底通道，不自动触发。
  # VPS is kept as manual fallback only.
  workflow_dispatch:
    inputs:
      runner:
        description: "🖥️ Runner (ubuntu-latest = GitHub托管 / self-hosted = 本地Mac算力)"
        type: choice
        options: [ubuntu-latest, self-hosted]
        default: ubuntu-latest
  workflow_call:
    inputs:
      runner:
        description: "Runner to use"
        type: string
        default: ubuntu-latest

concurrency:
  group: deploy-admin
  cancel-in-progress: false

env:
  IMAGE_NAME: ghcr.io/mrbigporter/lucky-admin-next-prod

jobs:
  # =========================================
  # 阶段一: 构建 + 推送镜像到 GHCR
  # =========================================
  build:
    runs-on: ${{ inputs.runner || 'ubuntu-latest' }}
    permissions:
      contents: read
      packages: write

    steps:
      # Step 1 / 步骤 1: Checkout repository source code
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      # Step 2 / 步骤 2: Enable Docker Buildx builder
      - name: 2. Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 3 / 步骤 3: Authenticate to GHCR for image push
      - name: 3. Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Step 4 / 步骤 4: Generate Docker image tags/labels metadata
      - name: 4. Docker meta (生成标签)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ github.sha }}
            type=sha,prefix=
            type=raw,value=latest

      # Step 4.1 / 步骤 4.1: Prepare build timestamp and commit SHA metadata
      - name: 4.1 Prepare Build Metadata
        id: build_meta
        run: |
          echo "deployed_at=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"
          echo "git_sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      # Step 5 / 步骤 5: Build admin image and push to GHCR
      - name: 5. Build & Push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/admin-next/Dockerfile.prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=${{ secrets.NEXT_PUBLIC_API_BASE_URL }}
            NEXT_PUBLIC_APP_ENV=production
            NEXT_PUBLIC_DEPLOYED_AT=${{ steps.build_meta.outputs.deployed_at }}
            NEXT_PUBLIC_GIT_SHA=${{ steps.build_meta.outputs.git_sha }}

  # =========================================
  # 阶段二: SSH 部署到 VPS
  # =========================================
  deploy:
    needs: build
    runs-on: ${{ inputs.runner || 'ubuntu-latest' }}
    environment: production

    steps:
      # Step 0 / 步骤 0: Checkout repo for deployment artifacts/scripts
      - name: 0. Checkout Code
        uses: actions/checkout@v4

      # Step 0.1 / 步骤 0.1: Sync deploy shell scripts to VPS
      - name: 0.1 Sync deploy scripts to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "deploy/*.sh"
          target: /opt/lucky/deploy
          overwrite: true

      # Step 1 / 步骤 1: Pull image, restart service, health-check, and rollback via SSH
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          GHCR_TOKEN: ${{ secrets.VPS_GHCR_PAT }}
          GHCR_USER: ${{ github.repository_owner }}
          IMAGE: ${{ env.IMAGE_NAME }}:${{ github.sha }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GHCR_TOKEN,GHCR_USER,IMAGE
          script: |
            set -e
            cd /opt/lucky

            # 0. 确保同步后的脚本可执行
            chmod +x deploy/*.sh || true

            # 1. 登录 GHCR
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            # 2. 拉取新镜像
            echo "→ 拉取镜像: $IMAGE"
            docker pull "$IMAGE"

            # 3. 保存当前镜像 (用于回滚)
            PREV_IMAGE=$(docker inspect lucky-admin-next-prod \
              --format '{{.Config.Image}}' 2>/dev/null || echo "")

            # 4. 用新镜像重启 admin-next
            echo "→ 重启 admin-next 容器..."
            ADMIN_IMAGE="$IMAGE" docker compose -f compose.prod.yml \
              --env-file deploy/.env.prod \
              up -d --no-build --force-recreate admin-next

            # 5. 健康检查 (最多等 60 秒)
            echo "→ 等待健康检查..."
            HEALTHY=false
            for i in $(seq 1 20); do
              if docker exec lucky-admin-next-prod wget -qO- http://localhost:3001/ >/dev/null 2>&1; then
                echo "✅ 健康检查通过 (第 ${i} 次, 约 $((i*3))s)"
                HEALTHY=true
                break
              fi
              sleep 3
            done

            # 6. 健康检查失败 → 自动回滚
            if [ "$HEALTHY" = false ]; then
              echo "❌ 健康检查超时! 正在回滚..."
              docker logs --tail=50 lucky-admin-next-prod
              if [ -n "$PREV_IMAGE" ]; then
                ADMIN_IMAGE="$PREV_IMAGE" docker compose -f compose.prod.yml \
                  --env-file deploy/.env.prod \
                  up -d --no-build --force-recreate admin-next
                echo "⚠️  已回滚到旧版本！"
              fi
              exit 1
            fi

            # 7. 清理旧镜像
            docker image prune -f

      # =========================================
      # 阶段三: Telegram 通知
      # =========================================
      # Step 2 / 步骤 2: Send deployment status notification to Telegram
      - name: 📱 Send Telegram Notification
        if: always()
        run: |
          STATUS_EMOJI="✅ Success"
          if [ "${{ job.status }}" != "success" ]; then
            STATUS_EMOJI="❌ Failed"
          fi

          MESSAGE="🌐 *Admin Next Deployment Report (VPS Rollback Channel)*
          📌 *Status*: $STATUS_EMOJI
          🏷️ *Environment*: Production (VPS)
          🔗 *Admin URL*: [admin.joyminis.com](https://admin.joyminis.com)
          📝 *Commit*: \`${{ github.sha }}\`"

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=$MESSAGE" \
            -d "parse_mode=Markdown"
