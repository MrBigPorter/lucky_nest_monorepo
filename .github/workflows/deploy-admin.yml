# ============================================================
# Admin 前端部署到 Cloudflare Pages — admin-next (Next.js)
# ============================================================
name: Deploy Admin to Cloudflare

on:
  push:
    branches: [main]
    paths:
      - 'apps/admin-next/**'
      - 'packages/shared/**'
      - 'packages/ui/**'
  workflow_dispatch:
  workflow_call:

concurrency:
  group: deploy-admin
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      # ================= 阶段 1：准备工作 =================
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 3. Enable Corepack (Yarn 4)
        run: corepack enable && corepack prepare yarn@4.9.2 --activate

      - name: 4. Cache Yarn
        uses: actions/cache@v4
        with:
          path: |
            .yarn/cache
            .yarn/install-state.gz
          key: yarn-${{ hashFiles('yarn.lock') }}
          restore-keys: yarn-

      - name: 5. Cache node_modules
        uses: actions/cache@v4
        id: nm-cache
        with:
          path: |
            node_modules
            apps/admin-next/node_modules
            packages/shared/node_modules
            packages/ui/node_modules
          key: nm-admin-${{ runner.os }}-${{ hashFiles('yarn.lock') }}

      - name: 6. Install dependencies
        if: steps.nm-cache.outputs.cache-hit != 'true'
        run: yarn install --immutable

      # ================= 阶段 2：打包 =================
      - name: 7. Build Admin Next (Next.js static export)
        run: yarn workspace @lucky/admin-next build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_API_BASE_URL: ${{ secrets.NEXT_PUBLIC_API_BASE_URL }}
          NEXT_PUBLIC_APP_ENV: production

      # ================= 阶段 3：部署到 Cloudflare =================
      - name: 8. Install Wrangler
        run: npm install -g wrangler@3

      - name: 9. Create Cloudflare Project (首次自动建项目)
        run: wrangler pages project create admin-next --production-branch=main || echo "项目已存在，跳过"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: 10. Deploy to Cloudflare Pages
        run: wrangler pages deploy apps/admin-next/out --project-name=admin-next --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # ================= 阶段 4：通知 =================
      - name: 11. GitHub Summary
        run: |
          echo "### ✅ Admin Next 部署完成" >> $GITHUB_STEP_SUMMARY
          echo "- **项目**: admin-next (Next.js)" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: https://admin.joyminis.com" >> $GITHUB_STEP_SUMMARY

      - name: 12. 📱 Telegram Notification
        if: always()
        run: |
          STATUS_EMOJI="✅ 成功 (Success)"
          if [ "${{ job.status }}" != "success" ]; then
            STATUS_EMOJI="❌ 失败 (Failed)"
          fi
          MESSAGE="🌐 *Admin Next 部署报告*
          📌 *状态*: $STATUS_EMOJI
          🏷️ *环境*: Production (Cloudflare)
          🔗 *访问*: [admin.joyminis.com](https://admin.joyminis.com)
          📝 *Commit ID*: \`${{ github.sha }}\`"

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=$MESSAGE" \
            -d "parse_mode=Markdown"