# ============================================================
# Admin 前端部署 — 构建 Docker 镜像推送 GHCR，SSH 部署到 VPS
# ============================================================
# 旧: 静态导出 → Cloudflare Pages
# 新: standalone Node.js → Docker → VPS (admin-next 容器)
# ============================================================
name: Deploy Admin

on:
  # VPS 部署现在只作为回滚渠道，不再自动触发。
  # 主渠道已切换到 Cloudflare Workers (deploy-admin-cloudflare.yml)。
  # 通过 deploy-master.yml 手动触发，或直接 workflow_dispatch。
  workflow_dispatch:
  workflow_call:

concurrency:
  group: deploy-admin
  cancel-in-progress: false

env:
  IMAGE_NAME: ghcr.io/mrbigporter/lucky-admin-next-prod

jobs:
  # =========================================
  # 阶段一: 构建 + 推送镜像到 GHCR
  # =========================================
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 3. Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 4. Docker meta (生成标签)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ github.sha }}
            type=sha,prefix=
            type=raw,value=latest

      - name: 5. Build & Push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/admin-next/Dockerfile.prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=${{ secrets.NEXT_PUBLIC_API_BASE_URL }}
            NEXT_PUBLIC_APP_ENV=production

  # =========================================
  # 阶段二: SSH 部署到 VPS
  # =========================================
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          GHCR_TOKEN: ${{ secrets.VPS_GHCR_PAT }}
          GHCR_USER: ${{ github.repository_owner }}
          IMAGE: ${{ env.IMAGE_NAME }}:${{ github.sha }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GHCR_TOKEN,GHCR_USER,IMAGE
          script: |
            set -e
            cd /opt/lucky

            # 1. 登录 GHCR
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            # 2. 拉取新镜像
            echo "→ 拉取镜像: $IMAGE"
            docker pull "$IMAGE"

            # 3. 保存当前镜像 (用于回滚)
            PREV_IMAGE=$(docker inspect lucky-admin-next-prod \
              --format '{{.Config.Image}}' 2>/dev/null || echo "")

            # 4. 用新镜像重启 admin-next
            echo "→ 重启 admin-next 容器..."
            ADMIN_IMAGE="$IMAGE" docker compose -f compose.prod.yml \
              --env-file deploy/.env.prod \
              up -d --no-build --force-recreate admin-next

            # 5. 健康检查 (最多等 60 秒)
            echo "→ 等待健康检查..."
            HEALTHY=false
            for i in $(seq 1 20); do
              if docker exec lucky-admin-next-prod wget -qO- http://localhost:3001/ >/dev/null 2>&1; then
                echo "✅ 健康检查通过 (第 ${i} 次, 约 $((i*3))s)"
                HEALTHY=true
                break
              fi
              sleep 3
            done

            # 6. 健康检查失败 → 自动回滚
            if [ "$HEALTHY" = false ]; then
              echo "❌ 健康检查超时! 正在回滚..."
              docker logs --tail=50 lucky-admin-next-prod
              if [ -n "$PREV_IMAGE" ]; then
                ADMIN_IMAGE="$PREV_IMAGE" docker compose -f compose.prod.yml \
                  --env-file deploy/.env.prod \
                  up -d --no-build --force-recreate admin-next
                echo "⚠️  已回滚到旧版本！"
              fi
              exit 1
            fi

            # 7. 清理旧镜像
            docker image prune -f

      # =========================================
      # 阶段三: Telegram 通知
      # =========================================
      - name: 📱 Send Telegram Notification
        if: always()
        run: |
          STATUS_EMOJI="✅ 成功 (Success)"
          if [ "${{ job.status }}" != "success" ]; then
            STATUS_EMOJI="❌ 失败 (Failed)"
          fi

          MESSAGE="🌐 *Admin Next 部署报告*
          📌 *状态*: $STATUS_EMOJI
          🏷️ *环境*: Production (VPS)
          🔗 *访问*: [admin.joyminis.com](https://admin.joyminis.com)
          📝 *Commit ID*: \`${{ github.sha }}\`"

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=$MESSAGE" \
            -d "parse_mode=Markdown"

