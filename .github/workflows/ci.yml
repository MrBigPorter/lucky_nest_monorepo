# ============================================================
# CI 检查 — PR 和 main 推送时运行
# ============================================================
# 流程: 安装依赖 → Prisma 生成 → Lint → 类型检查 → 单元测试 → E2E
# 目的: 在代码合并前发现问题, 避免部署失败
# ============================================================

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# 同一 PR 新提交时取消旧运行
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================
  # Job 1: Lint + 类型检查 + 单元测试
  # ============================================================
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: "Install build tools (native modules: bcrypt, sharp)"
        run: sudo apt-get install -y python3 make g++ openssl

      - name: Enable Corepack (Yarn 4)
        run: corepack enable && corepack prepare yarn@4.9.2 --activate

      # ---- 依赖缓存 (zip 包层) ----
      - name: Cache Yarn zip cache
        uses: actions/cache@v4
        with:
          path: |
            .yarn/cache
            .yarn/install-state.gz
          key: yarn-${{ hashFiles('yarn.lock') }}
          restore-keys: yarn-

      # ---- node_modules 缓存 (加速 link 步骤) ----
      - name: Cache node_modules
        uses: actions/cache@v4
        id: nm-cache
        with:
          path: |
            node_modules
            apps/api/node_modules
            apps/admin-next/node_modules
            apps/mini-shop-admin/node_modules
            apps/liveness-web/node_modules
            packages/*/node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('yarn.lock') }}

      # ---- Turbo 远程缓存 ----
      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ github.ref_name }}-
            turbo-main-

      - name: Install dependencies
        if: steps.nm-cache.outputs.cache-hit != 'true'
        run: yarn install --immutable

      # Prisma generate 必须在类型检查前运行
      - name: Generate Prisma Client
        run: yarn workspace @lucky/api prisma generate

      - name: Lint
        run: yarn turbo run lint
        continue-on-error: true

      - name: Type Check
        run: yarn turbo run check-types

      # admin-next 单元测试 — 必须通过
      - name: Unit Test — admin-next (required)
        run: yarn workspace @lucky/admin-next test

      # 其他包测试 — 允许跳过
      - name: Unit Test — other packages (optional)
        run: yarn turbo run test --filter=!@lucky/admin-next
        continue-on-error: true

  # ============================================================
  # Job 2: Playwright E2E（仅 PR，需 E2E_ADMIN_PASSWORD secret）
  # 依赖 Job 1 通过，避免浪费时间
  # ============================================================
  e2e:
    needs: check
    runs-on: ubuntu-latest
    # 只有配置了 E2E secret 才运行（避免 fork PR 失败）
    if: ${{ secrets.E2E_ADMIN_PASSWORD != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack (Yarn 4)
        run: corepack enable && corepack prepare yarn@4.9.2 --activate

      - name: Cache Yarn zip cache
        uses: actions/cache@v4
        with:
          path: |
            .yarn/cache
            .yarn/install-state.gz
          key: yarn-${{ hashFiles('yarn.lock') }}
          restore-keys: yarn-

      - name: Cache node_modules
        uses: actions/cache@v4
        id: nm-cache-e2e
        with:
          path: |
            node_modules
            apps/admin-next/node_modules
            packages/ui/node_modules
            packages/config/node_modules
          key: nm-e2e-${{ runner.os }}-${{ hashFiles('yarn.lock') }}

      - name: Install dependencies
        if: steps.nm-cache-e2e.outputs.cache-hit != 'true'
        run: yarn install --immutable

      # 安装 Playwright 浏览器（带缓存）
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('apps/admin-next/package.json') }}

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: yarn workspace @lucky/admin-next playwright install chromium --with-deps

      # 构建 Next.js（静态导出 + 本地 serve，无需后端）
      - name: Build @repo/ui
        run: node packages/ui/scripts/build.js

      - name: Build admin-next
        run: yarn workspace @lucky/admin-next build
        env:
          NODE_ENV: production
          # E2E 用 mock API URL，不依赖真实后端
          NEXT_PUBLIC_API_BASE_URL: http://localhost:3001/api
          NEXT_PUBLIC_APP_ENV: production

      # 用 npx serve 本地服务静态导出文件
      - name: Start static server
        run: |
          npm install -g serve
          serve apps/admin-next/out -l 4001 &
          echo "SERVER_PID=$!" >> $GITHUB_ENV
          # 等待服务器就绪
          npx wait-on http://localhost:4001 --timeout 30000

      # 启动 mock API server（拦截登录等请求，返回假 token）
      - name: Start mock API server
        run: |
          cat > /tmp/mock-api.js << 'EOF'
          const http = require('http');
          const server = http.createServer((req, res) => {
            res.setHeader('Content-Type', 'application/json');
            res.setHeader('Access-Control-Allow-Origin', '*');
            res.setHeader('Access-Control-Allow-Headers', '*');
            if (req.method === 'OPTIONS') { res.end(); return; }
            if (req.url.includes('/auth/login')) {
              res.end(JSON.stringify({ code: 10000, data: { accessToken: 'e2e-test-token' } }));
            } else if (req.url.includes('/auth/logout')) {
              res.end(JSON.stringify({ code: 10000, data: null }));
            } else {
              res.end(JSON.stringify({ code: 10000, data: { list: [], total: 0 } }));
            }
          });
          server.listen(3001, () => console.log('Mock API on :3001'));
          EOF
          node /tmp/mock-api.js &

      - name: Run Playwright E2E tests
        run: yarn workspace @lucky/admin-next e2e
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:4001
          E2E_ADMIN_USERNAME: ${{ secrets.E2E_ADMIN_USERNAME || 'admin' }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
        continue-on-error: true  # E2E 失败不阻断 CI，但会在 Summary 中标注

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/admin-next/playwright-report/
          retention-days: 7

      - name: E2E Summary
        if: always()
        run: |
          echo "### 🎭 Playwright E2E Report" >> $GITHUB_STEP_SUMMARY
          echo "- **浏览器**: Chromium" >> $GITHUB_STEP_SUMMARY
          echo "- **报告**: 见 Artifacts → playwright-report" >> $GITHUB_STEP_SUMMARY

