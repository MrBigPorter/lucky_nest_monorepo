name: 🚀 Master Deployment Control

on:
  workflow_dispatch:
    inputs:
      deploy_admin:
        description: '🌐 Deploy Admin Frontend (Cloudflare)'
        type: boolean
        default: true
      deploy_api:
        description: '⚙️ Deploy Backend API (VPS)'
        type: boolean
        default: true

# 🔑 KEY FIX: Explicitly grant permissions to the master workflow
# This allows the child workflows to inherit the rights they need.
permissions:
  contents: read
  deployments: write   # Required for Cloudflare Pages status
  packages: write      # Required for GHCR (Docker) pushing

jobs:
  # 1. Calls the Admin deployment workflow
  run-admin-deploy:
    name: 🌐 Trigger Admin Deploy
    if: ${{ inputs.deploy_admin == true }}
    uses: ./.github/workflows/deploy-admin.yml
    secrets: inherit # Pass all repository secrets down

  # 2. Calls the Backend deployment workflow
  run-backend-deploy:
    name: ⚙️ Trigger Backend Deploy
    if: ${{ inputs.deploy_api == true }}
    uses: ./.github/workflows/deploy-backend.yml
    secrets: inherit # Pass all repository secrets down