# ==========================================
# Nginx 生产环境配置 (纯 API 数据中心)
# ==========================================
# 特点：
#   - 专属 API 域名 (api.joyminis.com)
#   - Swagger 文档禁止外部访问
#   - 生产级 SSL + 安全头
#   - Gzip 压缩 + 限流保护
# ==========================================

# Gzip 压缩
gzip on;
gzip_min_length 1k;
gzip_comp_level 5;
gzip_vary on;
gzip_proxied any;
gzip_types
    application/json
    application/javascript
    application/xml
    text/plain
    text/css
    text/javascript
    image/svg+xml;

# 预检请求分流
map $request_method $is_options {
    default 0;
    OPTIONS 1;
}

# API 限流 (每秒 20 请求 / IP，突发 50)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;

# ==========================================
# HTTPS 443 — 主服务 (API 网关)
# ==========================================
server {
    listen 443 ssl;
    http2 on;

    server_name api.joyminis.com;

    # ---- SSL ----
    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:2m;
    ssl_session_timeout 10m;

    proxy_ssl_server_name on;

    access_log /dev/stdout combined;
    error_log  /dev/stderr warn;

    client_max_body_size 50M;

    # ---- 安全头 ----
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ========================================================
    #  A. 静态文件 & 特殊业务
    # ========================================================

    location = /share.html {
        proxy_pass http://backend:3000/api/v1/share.html$is_args$args;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /.well-known/ {
        root /var/www/html;
        default_type application/json;
        try_files $uri $uri/ =404;
    }

    # ========================================================
    #  B. 支付 Webhook (不限流)
    # ========================================================
    location ~ ^/api/(v1/)?payment/webhook/xendit {
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ========================================================
    #  C. 媒体处理 (Cloudflare + Range)
    # ========================================================

    location ^~ /cdn-cgi/image/ {
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Expose-Headers;

        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET,HEAD,OPTIONS" always;
        add_header Access-Control-Allow-Headers "*" always;
        add_header Access-Control-Expose-Headers "Content-Length,Content-Range,Accept-Ranges" always;

        if ($is_options) { return 204; }

        proxy_buffering off;
        proxy_max_temp_file_size 0;

        proxy_pass https://img.joyminis.com;
        proxy_set_header Host img.joyminis.com;
        proxy_ssl_name img.joyminis.com;
    }

    location ~* ^/uploads/.*\.(mp4|mov|m4a)$ {
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Expose-Headers;

        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET,HEAD,OPTIONS" always;
        add_header Access-Control-Allow-Headers "*" always;
        add_header Access-Control-Expose-Headers "Content-Length,Content-Range,Accept-Ranges" always;

        if ($is_options) { return 204; }

        proxy_buffering off;
        proxy_max_temp_file_size 0;
        proxy_force_ranges on;

        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_ssl_server_name on;
        proxy_ssl_name img.joyminis.com;
        proxy_set_header Host img.joyminis.com;

        proxy_set_header Range $http_range;
        proxy_pass_header Content-Range;
        proxy_pass_header Accept-Ranges;

        proxy_pass https://img.joyminis.com;
    }

    location ^~ /uploads/ {
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Expose-Headers;

        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET,HEAD,OPTIONS" always;
        add_header Access-Control-Allow-Headers "*" always;
        add_header Access-Control-Expose-Headers "Content-Length,Content-Range,Accept-Ranges" always;

        if ($is_options) { return 204; }

        proxy_buffering off;
        proxy_max_temp_file_size 0;

        proxy_pass https://img.joyminis.com;
        proxy_set_header Host img.joyminis.com;
        proxy_ssl_name img.joyminis.com;
    }

    # ========================================================
    #  D. 核心 API
    # ========================================================

    # 调账白名单
    location = /api/v1/admin/finance/adjust {
        include /etc/nginx/conf.d/whitelist.conf;
        deny all;

        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 🚫 生产环境：Swagger 仅允许白名单访问
    location ~ ^/(docs|swagger-ui|api-json) {
        include /etc/nginx/conf.d/whitelist.conf;
        deny all;

        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 通用 API (含上传超时 + 限流)
    location /api/ {
        limit_req zone=api_limit burst=50 nodelay;

        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;

        if ($is_options) {
            add_header Access-Control-Allow-Origin '*' always;
            add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
            add_header Access-Control-Allow-Headers '*' always;
            add_header Access-Control-Max-Age 1728000 always;
            add_header Content-Type 'text/plain; charset=utf-8';
            add_header Content-Length 0;
            return 204;
        }

        add_header Access-Control-Allow-Origin '*' always;
        add_header Access-Control-Allow-Headers '*' always;

        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ========================================================
    #  E. WebSocket / Socket.IO
    # ========================================================
    location ^~ /socket.io/ {
        proxy_pass http://backend:3000;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}

# ==========================================
# HTTP → HTTPS 跳转
# ==========================================
server {
    listen 80;
    server_name api.joyminis.com admin.joyminis.com;
    return 301 https://$host$request_uri;
}

# ==========================================
# HTTPS 443 — Admin 前端 (自托管静态文件)
# ==========================================
# 说明:
#   - CI 部署: admin 托管于 Cloudflare Pages，此块无需启用
#   - 自托管/备用: admin-builder 将静态文件挂载到 /var/www/admin
#     需在 compose.prod.yml 中启用 --profile local
# ==========================================
server {
    listen 443 ssl;
    http2 on;

    server_name admin.joyminis.com;

    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:2m;
    ssl_session_timeout 10m;

    access_log /dev/stdout combined;
    error_log  /dev/stderr warn;

    # ---- 安全头 ----
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    root /var/www/admin;

    # Next.js static export — 带 trailingSlash: true
    # 优先精确文件 → 目录下 index.html → 404
    location / {
        try_files $uri $uri/ $uri/index.html /index.html;
    }

    # 静态资源长缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # API 反向代理（admin 前端调用 /api/）
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
