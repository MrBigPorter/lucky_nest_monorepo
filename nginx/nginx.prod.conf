# ==========================================
# Nginx 生产环境配置 (纯 API 数据中心)
# ==========================================
# 特点：
#   - 专属 API 域名 (api.joyminis.com)
#   - Swagger 文档禁止外部访问
#   - 生产级 SSL + 安全头
#   - Gzip 压缩 + 限流保护
# ==========================================

# Gzip 压缩
gzip on;
gzip_min_length 1k;
gzip_comp_level 5;
gzip_vary on;
gzip_proxied any;
gzip_types
    application/json
    application/javascript
    application/xml
    text/plain
    text/css
    text/javascript
    image/svg+xml;

# 预检请求分流
map $request_method $is_options {
    default 0;
    OPTIONS 1;
}

# API 限流 (每秒 20 请求 / IP，突发 50)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;

# ==========================================
# HTTPS 443 — 主服务 (API 网关)
# ==========================================
server {
    listen 443 ssl;
    http2 on;

    server_name api.joyminis.com;

    # ---- SSL ----
    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:2m;
    ssl_session_timeout 10m;

    proxy_ssl_server_name on;

    access_log /dev/stdout combined;
    error_log  /dev/stderr warn;

    client_max_body_size 50M;

    # ---- 安全头 ----
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ========================================================
    #  A. 静态文件 & 特殊业务
    # ========================================================

    location = /share.html {
        proxy_pass http://backend:3000/api/v1/share.html$is_args$args;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /.well-known/ {
        root /var/www/html;
        
        # 设置正确的Content-Type
        # 注意：不能在if块内使用default_type，所以使用map指令来处理
        try_files $uri $uri/ =404;
        
        # 根据文件类型设置Content-Type
        # 对于JSON文件
        if ($uri ~* "\.json$") {
            add_header Content-Type application/json always;
        }
        # 对于apple-app-site-association文件
        if ($uri ~* "apple-app-site-association$") {
            add_header Content-Type application/json always;
        }
        
        # 添加CORS头，允许所有来源访问（Android/iOS系统需要）
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "*" always;
        
        # 缓存控制 - 系统会缓存这些文件
        add_header Cache-Control "public, max-age=3600";
    }

    # ========================================================
    #  B. 支付 Webhook (不限流)
    # ========================================================
    location ~ ^/api/(v1/)?payment/webhook/xendit {
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ========================================================
    #  C. 媒体处理 (已停用)
    # ========================================================
    # 2026-03-21: 图片/媒体统一走 Cloudflare 图片域名（img.joyminis.com），
    # 不再通过 api.joyminis.com 进行 /cdn-cgi/image 或 /uploads 转发。
    # 若需回滚，请恢复历史版本中的三个 location 块：
    # - location ^~ /cdn-cgi/image/
    # - location ~* ^/uploads/.*\.(mp4|mov|m4a)$
    # - location ^~ /uploads/

    # ========================================================
    #  D. 核心 API
    # ========================================================

    # 调账白名单
    location = /api/v1/admin/finance/adjust {
        include /etc/nginx/conf.d/whitelist.conf;
        deny all;

        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 🚫 生产环境：Swagger 仅允许白名单访问
    location ~ ^/(docs|swagger-ui|api-json) {
        include /etc/nginx/conf.d/whitelist.conf;
        deny all;

        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 通用 API (含上传超时 + 限流)
    # CORS 完全由 NestJS (main.ts enableCors) 处理，Nginx 不添加任何 CORS 头，
    # 避免双重 CORS 头冲突（浏览器会拒绝同时包含 * 和具体域名的响应）。
    location /api/ {
        limit_req zone=api_limit burst=50 nodelay;

        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;


        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ========================================================
    #  D.1 OAuth 授权路由 (/auth/) - 代理到后端 API
    # ========================================================
    location ^~ /auth/ {
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;

        # 处理预检请求
        if ($is_options) {
            add_header Access-Control-Allow-Origin '*' always;
            add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS' always;
            add_header Access-Control-Allow-Headers '*' always;
            add_header Access-Control-Max-Age 1728000 always;
            add_header Content-Type 'text/plain; charset=utf-8';
            add_header Content-Length 0;
            return 204;
        }

        add_header Access-Control-Allow-Origin '*' always;
        add_header Access-Control-Allow-Headers '*' always;

        # 转发到后端时需要加上 /api/v1 前缀，因为 NestJS 有全局前缀和版本
        # /auth/xxx → /api/v1/auth/xxx
        proxy_pass http://backend:3000/api/v1$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # OAuth 回调需要保持 URL 参数
        proxy_set_header X-Original-URI $request_uri;
    }

    # ========================================================
    #  E. WebSocket / Socket.IO
    # ========================================================
    location ^~ /socket.io/ {
        proxy_pass http://backend:3000;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}

# ==========================================
# HTTP → HTTPS 跳转
# ==========================================
server {
    listen 80;
    server_name api.joyminis.com;
    return 301 https://$host$request_uri;
}

