# ==========================================
# Nginx 开发环境配置
# ==========================================
# 特点：
#   - Admin 前端代理到 Vite dev server (HMR 热更新)
#   - Swagger 文档开放访问
#   - 本地 mkcert 证书
# ==========================================

# Gzip 压缩
gzip on;
gzip_min_length 1k;
gzip_types application/json text/plain application/javascript text/css application/xml;

# 预检请求分流
map $request_method $is_options {
    default 0;
    OPTIONS 1;
}

# ==========================================
# HTTPS 443
# ==========================================
server {
    listen 443 ssl;
    http2 on;

    server_name admin-dev.joyminis.com dev-api.joyminis.com dev.joyminis.com;

    ssl_certificate     /etc/nginx/certs/dev.joyminis.com.pem;
    ssl_certificate_key /etc/nginx/certs/dev.joyminis.com-key.pem;

    proxy_ssl_server_name on;

    access_log /dev/stdout combined;
    error_log  /dev/stderr warn;

    client_max_body_size 500M;

    # Docker 内置 DNS，强制动态解析容器 IP（防止容器重启后 IP 缓存失效）
    # 必须放在 server 块顶部，且所有 proxy_pass 使用变量形式
    resolver 127.0.0.11 valid=5s ipv6=off;

    # ========================================================
    #  A. 静态文件 & 特殊业务
    # ========================================================

    location = /share.html {
        set $backend_upstream http://backend:3000;
        proxy_pass $backend_upstream/api/v1/share.html$is_args$args;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /.well-known/ {
        root /var/www/html;
        default_type application/json;
        try_files $uri $uri/ =404;
    }

    # ========================================================
    #  B. 支付 Webhook
    # ========================================================
    location ~ ^/api/(v1/)?payment/webhook/xendit {
        set $backend_upstream http://backend:3000;
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ========================================================
    #  C. 媒体处理 (Cloudflare + Range)
    # ========================================================

    location ^~ /cdn-cgi/image/ {
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Expose-Headers;

        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET,HEAD,OPTIONS" always;
        add_header Access-Control-Allow-Headers "*" always;
        add_header Access-Control-Expose-Headers "Content-Length,Content-Range,Accept-Ranges" always;

        if ($is_options) { return 204; }

        proxy_buffering off;
        proxy_max_temp_file_size 0;

        proxy_pass https://img.joyminis.com;
        proxy_set_header Host img.joyminis.com;
        proxy_ssl_name img.joyminis.com;
    }

    location ~* ^/uploads/.*\.(mp4|mov|m4a)$ {
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Expose-Headers;

        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET,HEAD,OPTIONS" always;
        add_header Access-Control-Allow-Headers "*" always;
        add_header Access-Control-Expose-Headers "Content-Length,Content-Range,Accept-Ranges" always;

        if ($is_options) { return 204; }

        proxy_buffering off;
        proxy_max_temp_file_size 0;
        proxy_force_ranges on;

        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_ssl_server_name on;
        proxy_ssl_name img.joyminis.com;
        proxy_set_header Host img.joyminis.com;

        proxy_set_header Range $http_range;
        proxy_pass_header Content-Range;
        proxy_pass_header Accept-Ranges;

        proxy_pass https://img.joyminis.com;
    }

    location ^~ /uploads/ {
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Expose-Headers;

        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET,HEAD,OPTIONS" always;
        add_header Access-Control-Allow-Headers "*" always;
        add_header Access-Control-Expose-Headers "Content-Length,Content-Range,Accept-Ranges" always;

        if ($is_options) { return 204; }

        proxy_buffering off;
        proxy_max_temp_file_size 0;

        proxy_pass https://img.joyminis.com;
        proxy_set_header Host img.joyminis.com;
        proxy_ssl_name img.joyminis.com;
    }

    # ========================================================
    #  D. 核心 API
    # ========================================================

    location = /api/v1/admin/finance/adjust {
        include /etc/nginx/conf.d/whitelist.conf;
        deny all;

        set $backend_upstream http://backend:3000;
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 开发环境：Swagger 文档开放访问
    location ~ ^/(docs|swagger-ui|api-json) {
        set $backend_upstream http://backend:3000;
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;

        if ($is_options) {
            add_header Access-Control-Allow-Origin '*' always;
            add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
            add_header Access-Control-Allow-Headers '*' always;
            add_header Access-Control-Max-Age 1728000 always;
            add_header Content-Type 'text/plain; charset=utf-8';
            add_header Content-Length 0;
            return 204;
        }

        add_header Access-Control-Allow-Origin '*' always;
        add_header Access-Control-Allow-Headers '*' always;

        set $backend_upstream http://backend:3000;
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ========================================================
    #  E. WebSocket / Socket.IO
    # ========================================================
    location ^~ /socket.io/ {
        set $backend_upstream http://backend:3000;
        proxy_pass $backend_upstream;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ========================================================
    #  F. Admin 前端 — 代理到 Next.js Dev Server (HMR)
    # ========================================================

    # Next.js HMR WebSocket (Turbopack / webpack hot reload)
    location ^~ /_next/ {
        set $admin_next_upstream http://admin-next:4001;
        proxy_pass $admin_next_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
    }

    location / {
        set $admin_next_upstream http://admin-next:4001;
        proxy_pass $admin_next_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Next.js Turbopack 冷启动可能需要 2-3 分钟
        proxy_connect_timeout 600s;
        proxy_send_timeout    600s;
        proxy_read_timeout    600s;
        # 502/503 时自动重试（容器启动中）
        proxy_next_upstream error timeout http_502 http_503;
        proxy_next_upstream_tries 3;
        proxy_next_upstream_timeout 30s;
    }
}

# ==========================================
# HTTP → HTTPS 跳转
# ==========================================
server {
    listen 80;
    server_name admin-dev.joyminis.com dev-api.joyminis.com dev.joyminis.com;
    return 301 https://$host$request_uri;
}
