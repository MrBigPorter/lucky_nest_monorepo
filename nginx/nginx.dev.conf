# ==========================================
# Nginx 开发环境配置
# ==========================================
# 特点：
#   - Admin 前端代理到 Vite dev server (HMR 热更新)
#   - Swagger 文档开放访问
#   - 本地 mkcert 证书
# ==========================================

# Gzip 压缩
gzip on;
gzip_min_length 1k;
gzip_types application/json text/plain application/javascript text/css application/xml;

# 预检请求分流
map $request_method $is_options {
    default 0;
    OPTIONS 1;
}

# ==========================================
# HTTPS 443
# ==========================================
server {
    listen 443 ssl;
    http2 on;

    server_name admin-dev.joyminis.com dev-api.joyminis.com dev.joyminis.com;

    ssl_certificate     /etc/nginx/certs/dev.joyminis.com.pem;
    ssl_certificate_key /etc/nginx/certs/dev.joyminis.com-key.pem;

    proxy_ssl_server_name on;

    access_log /dev/stdout combined;
    error_log  /dev/stderr warn;

    client_max_body_size 500M;

    # Docker 内置 DNS，强制动态解析容器 IP（防止容器重启后 IP 缓存失效）
    # 必须放在 server 块顶部，且所有 proxy_pass 使用变量形式
    resolver 127.0.0.11 valid=5s ipv6=off;

    # ========================================================
    #  A. 静态文件 & 特殊业务
    # ========================================================

    location = /share.html {
        set $backend_upstream http://backend:3000;
        proxy_pass $backend_upstream/api/v1/share.html$is_args$args;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /.well-known/ {
        root /var/www/html;
        
        # 设置正确的Content-Type
        # 注意：不能在if块内使用default_type，所以使用map指令来处理
        try_files $uri $uri/ =404;
        
        # 根据文件类型设置Content-Type
        # 对于JSON文件
        if ($uri ~* "\.json$") {
            add_header Content-Type application/json always;
        }
        # 对于apple-app-site-association文件
        if ($uri ~* "apple-app-site-association$") {
            add_header Content-Type application/json always;
        }
        
        # 添加CORS头，允许所有来源访问（Android/iOS系统需要）
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "*" always;
        
        # 缓存控制 - 系统会缓存这些文件
        add_header Cache-Control "public, max-age=3600";
    }

    # ========================================================
    #  B. 支付 Webhook
    # ========================================================
    location ~ ^/api/(v1/)?payment/webhook/xendit {
        set $backend_upstream http://backend:3000;
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ========================================================
    #  C. 媒体处理 (Cloudflare + Range)
    # ========================================================

    # -------------------------------------------------------
    # Cloudflare image optimisation (/cdn-cgi/image/…)
    #
    # Nginx normalises // in URI paths → /
    # so https://img.joyminis.com/… becomes https:/img.joyminis.com/…
    # We capture (https?:) and the rest separately, then
    # reconstruct the absolute URL with // in the return directive.
    #
    #  /cdn-cgi/image/<params>/uploads/...
    #    → 302 https://img.joyminis.com/uploads/...
    #
    #  /cdn-cgi/image/<params>/https:/img.joyminis.com/…
    #    → 302 https://img.joyminis.com/…
    # -------------------------------------------------------
    location ~ "^/cdn-cgi/image/[^/]+/(uploads/.*)$" {
        add_header Access-Control-Allow-Origin "*" always;
        if ($is_options) { return 204; }
        return 302 https://img.joyminis.com/$1;
    }

    location ~ "^/cdn-cgi/image/[^/]+/(https?:)/*(.*)" {
        add_header Access-Control-Allow-Origin "*" always;
        if ($is_options) { return 204; }
        return 302 $1//$2;
    }

    # -------------------------------------------------------
    # Uploaded media (/uploads/…)
    #
    # Previously proxied to img.joyminis.com — this causes 502
    # when the Docker container's outbound connection to
    # Cloudflare is rate-limited or blocked.
    #
    # Fix: redirect the browser directly to the CDN origin.
    # The browser can always reach img.joyminis.com; only the
    # server-side proxy chain was failing.
    # -------------------------------------------------------
    location ^~ /uploads/ {
        add_header Access-Control-Allow-Origin "*" always;
        if ($is_options) { return 204; }
        return 302 https://img.joyminis.com$request_uri;
    }

    # ========================================================
    #  D. 核心 API
    # ========================================================

    location = /api/v1/admin/finance/adjust {
        include /etc/nginx/conf.d/whitelist.conf;
        deny all;

        set $backend_upstream http://backend:3000;
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 开发环境：Swagger 文档开放访问
    location ~ ^/(docs|swagger-ui|api-json) {
        set $backend_upstream http://backend:3000;
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ========================================================
    #  D. 核心 API (恢复跨域拦截，防止 404)
    # ========================================================
    location /api/ {
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;

        # 🚀 重点：强行吃掉 NestJS 返回的跨域头，完全由 Nginx 接管，防止"双重跨域"导致 Socket 失败
        proxy_hide_header 'Access-Control-Allow-Origin';
        proxy_hide_header 'Access-Control-Allow-Credentials';

        # 🚀 恢复你之前完美的预检请求 204 拦截
        if ($is_options) {
            add_header Access-Control-Allow-Origin '*' always;
            add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
            add_header Access-Control-Allow-Headers '*' always;
            add_header Access-Control-Max-Age 1728000 always;
            add_header Content-Type 'text/plain; charset=utf-8';
            add_header Content-Length 0;
            return 204;
        }

        add_header Access-Control-Allow-Origin '*' always;
        add_header Access-Control-Allow-Headers '*' always;

        set $backend_upstream http://backend:3000;
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # 兼容普通 API 里的升级请求
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ========================================================
    #  D.1 OAuth 授权路由 (/auth/) - 代理到后端 API
    # ========================================================
    location ^~ /auth/ {
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;

        # 处理预检请求
        if ($is_options) {
            add_header Access-Control-Allow-Origin '*' always;
            add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS' always;
            add_header Access-Control-Allow-Headers '*' always;
            add_header Access-Control-Max-Age 1728000 always;
            add_header Content-Type 'text/plain; charset=utf-8';
            add_header Content-Length 0;
            return 204;
        }

        add_header Access-Control-Allow-Origin '*' always;
        add_header Access-Control-Allow-Headers '*' always;

        set $backend_upstream http://backend:3000;
        # 转发到后端时需要加上 /api/v1 前缀，因为 NestJS 有全局前缀和版本
        # /auth/xxx → /api/v1/auth/xxx
        proxy_pass $backend_upstream/api/v1$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # OAuth 回调需要保持 URL 参数
        proxy_set_header X-Original-URI $request_uri;
    }

    # ========================================================
    #  E. WebSocket / Socket.IO (纯净通道)
    # ========================================================
    location ^~ /socket.io/ {
        set $backend_upstream http://backend:3000;
        proxy_pass $backend_upstream;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ========================================================
    #  F. Admin 前端 — 代理到 Next.js Dev Server (HMR)
    # ========================================================

    # Next.js HMR WebSocket (Turbopack / webpack hot reload)
    location ^~ /_next/ {
        set $admin_next_upstream http://admin-next:4001;
        proxy_pass $admin_next_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
    }

    location / {
        set $admin_next_upstream http://admin-next:4001;
        proxy_pass $admin_next_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Next.js Turbopack 冷启动可能需要 2-3 分钟
        proxy_connect_timeout 600s;
        proxy_send_timeout    600s;
        proxy_read_timeout    600s;
        # 502/503 时自动重试（容器启动中）
        proxy_next_upstream error timeout http_502 http_503;
        proxy_next_upstream_tries 3;
        proxy_next_upstream_timeout 30s;
    }
}

# ==========================================
# HTTP → HTTPS 跳转
# ==========================================
server {
    listen 80;
    server_name admin-dev.joyminis.com dev-api.joyminis.com dev.joyminis.com;
    return 301 https://$host$request_uri;
}