name: Full Deploy - {{PROJECT_NAME}}

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      runner:
        description: "Runner"
        type: choice
        options: [ubuntu-latest, self-hosted]
        default: ubuntu-latest

concurrency:
  group: full-deploy-{{PROJECT_NAME}}-${{ github.ref }}
  cancel-in-progress: false

env:
  BACKEND_IMAGE: ghcr.io/{{GITHUB_OWNER}}/{{PROJECT_NAME}}-backend

jobs:
  quality:
    runs-on: ${{ inputs.runner || 'ubuntu-latest' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - name: Install
        run: yarn install --immutable

      - name: Lint + Typecheck + Test
        run: |
          yarn turbo run lint
          yarn turbo run check-types
          yarn turbo run test

  build-and-push:
    needs: quality
    runs-on: ${{ inputs.runner || 'ubuntu-latest' }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
            ${{ env.BACKEND_IMAGE }}:latest
          platforms: linux/amd64

  deploy-backend:
    needs: build-and-push
    runs-on: ${{ inputs.runner || 'ubuntu-latest' }}
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync deploy scripts
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "deploy/*.sh"
          target: /opt/{{VPS_APP_DIR}}/deploy
          overwrite: true

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          GHCR_TOKEN: ${{ secrets.VPS_GHCR_PAT }}
          GHCR_USER: ${{ github.repository_owner }}
          IMAGE: ${{ env.BACKEND_IMAGE }}:latest
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GHCR_TOKEN,GHCR_USER,IMAGE
          script: |
            set -e
            cd /opt/{{VPS_APP_DIR}}
            chmod +x deploy/*.sh || true
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            docker pull "$IMAGE"

            docker run --rm \
              --env-file deploy/.env.prod \
              "$IMAGE" \
              ./node_modules/.bin/prisma migrate deploy --schema=apps/api/prisma/schema.prisma

            PREV_IMAGE=$(docker inspect {{PROJECT_NAME}}-backend-prod --format '{{.Config.Image}}' 2>/dev/null || echo "")

            BACKEND_IMAGE="$IMAGE" docker compose -f compose.prod.yml \
              --env-file deploy/.env.prod \
              up -d --no-build --force-recreate backend

            HEALTHY=false
            for i in $(seq 1 30); do
              if docker exec {{PROJECT_NAME}}-backend-prod wget -qO- http://localhost:3000/api/v1/health >/dev/null 2>&1; then
                HEALTHY=true
                break
              fi
              sleep 3
            done

            if [ "$HEALTHY" = false ]; then
              if [ -n "$PREV_IMAGE" ]; then
                BACKEND_IMAGE="$PREV_IMAGE" docker compose -f compose.prod.yml \
                  --env-file deploy/.env.prod \
                  up -d --no-build --force-recreate backend
              fi
              exit 1
            fi

