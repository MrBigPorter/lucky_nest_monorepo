# ========================
# 1. 内存管理 (新增核心)
# ========================
# 限制最大使用 512MB 内存
maxmemory 512mb

# 修改后 (BullMQ 要求的配置)
# 策略：内存满了直接报错 (OOM Error)，绝对不偷偷删除数据！
# 必须设为 noeviction，否则队列任务可能会被 Redis 误删导致卡单。
maxmemory-policy noeviction

# ========================
# 2. 持久化 (防断电)
# ========================
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec

save 900 1
save 300 10
save 60 10000

# ========================
# 3. Docker 基础配置
# ========================
dir /data
bind 0.0.0.0
protected-mode no