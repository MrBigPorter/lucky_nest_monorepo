# ==========================================
# 开发环境 Docker Compose
# ==========================================
# 启动: docker compose --env-file deploy/.env.dev up -d --build
# 停止: docker compose down
# 日志: docker compose logs -f
# ==========================================

services:
  # =========================================
  # Base 镜像 (预装依赖, api/admin 共用)
  # =========================================
  monorepo-base:
    build:
      context: .
      dockerfile: Dockerfile.base
      tags:
        - lucky-monorepo-base:latest
    command: ["true"]

  # =========================================
  # 后端 API (开发模式)
  # =========================================
  backend:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
    image: lucky-backend-dev:latest
    container_name: lucky-backend-dev
    env_file:
      - deploy/.env.dev
    command: >
      sh -c "corepack enable &&
             LOCK_HASH=$$(md5sum /app/yarn.lock | cut -d' ' -f1) &&
             CACHE=/app/node_modules/.backend-install-hash &&
             if [ ! -f \"$$CACHE\" ] || [ \"$$(cat $$CACHE 2>/dev/null)\" != \"$$LOCK_HASH\" ]; then
               echo '>>> yarn.lock changed - running install...' &&
               yarn workspaces focus @lucky/api &&
               echo \"$$LOCK_HASH\" > \"$$CACHE\";
             else
               echo '>>> yarn.lock unchanged - skipping install';
             fi &&
             export PATH=/app/node_modules/.bin:$$PATH &&
             echo '>>> Applying pending DB migrations...' &&
             yarn workspace @lucky/api pr:deploy &&
             yarn workspace @lucky/api start:dev"
    expose:
      - "3000"
    volumes:
      - .:/app
      - backend_nm:/app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [app]

  # =========================================
  # Admin 前端 (开发模式 — Next.js)
  # =========================================
  admin-next:
    build:
      context: .
      dockerfile: apps/admin-next/Dockerfile.dev
    container_name: lucky-admin-next-dev
    command: >
      sh -c "corepack enable &&
             LOCK_HASH=$$(md5sum /app/yarn.lock | cut -d' ' -f1) &&
             CACHE=/app/node_modules/.admin-install-hash &&
             if [ ! -f \"$$CACHE\" ] || [ \"$$(cat $$CACHE 2>/dev/null)\" != \"$$LOCK_HASH\" ]; then
               echo '>>> yarn.lock changed - running install...' &&
               yarn workspaces focus @lucky/admin-next &&
               echo \"$$LOCK_HASH\" > \"$$CACHE\";
             else
               echo '>>> yarn.lock unchanged - skipping install';
             fi &&
             echo '>>> Building @lucky/shared ...' &&
             node /app/packages/shared/scripts/build.js &&
             echo '>>> Building @repo/ui (pre-build for fast Next.js compilation)...' &&
             node /app/packages/ui/scripts/build.js &&
             yarn workspace @lucky/admin-next dev"
    expose:
      - "4001"
    volumes:
      - .:/app
      - admin_next_nm:/app/node_modules
      - admin_next_build:/app/apps/admin-next/.next
      - pkg_shared_nm:/app/packages/shared/node_modules
      - pkg_ui_nm:/app/packages/ui/node_modules
      - pkg_eslint_nm:/app/packages/eslint-config/node_modules
      - pkg_tsconfig_nm:/app/packages/typescript-config/node_modules
      - pkg_config_nm:/app/packages/config/node_modules
    environment:
      NEXT_PUBLIC_API_BASE_URL: /api
      # Server Components 直连后端（跳过 nginx 公网往返，降低 SSR 延迟）
      INTERNAL_API_URL: http://lucky-backend-dev:3000/api
      NEXT_PUBLIC_APP_ENV: development
      HOSTNAME: "0.0.0.0"
      # Google reCAPTCHA v3 Site Key (前端用，可公开)
      NEXT_PUBLIC_RECAPTCHA_SITE_KEY: ${NEXT_PUBLIC_RECAPTCHA_SITE_KEY:-}
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:4001/', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 120s
    depends_on:
      - backend
    networks: [app]

  # =========================================
  # Nginx 反向代理
  # =========================================
  nginx:
    image: nginx:latest
    container_name: lucky-nginx-dev
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/whitelist.conf:/etc/nginx/conf.d/whitelist.conf
      - ./certs:/etc/nginx/certs
      - ./nginx/html:/var/www/html
    depends_on:
      backend:
        condition: service_started
      admin-next:
        condition: service_healthy
    networks: [app]

  # =========================================
  # Redis
  # =========================================
  redis:
    image: redis:7
    container_name: lucky-redis
    command: redis-server /etc/redis/redis.conf --requirepass "${REDIS_PASSWORD:-devpassword}"
    env_file:
      - deploy/.env.dev
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
      - ./redis/redis.conf:/etc/redis/redis.conf
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD:-devpassword} ping | grep PONG"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [app]

  # =========================================
  # PostgreSQL
  # =========================================
  db:
    image: postgres:16
    container_name: lucky-db
    env_file:
      - deploy/.env.dev
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [app]

networks:
  app:


volumes:
  db_data:
  redis_data:
  backend_nm:
  admin_next_nm:
  admin_next_build:
  pkg_shared_nm:
  pkg_ui_nm:
  pkg_eslint_nm:
  pkg_tsconfig_nm:
  pkg_config_nm:

